title: WalkthroughStep
"@id": stencila:WalkthroughStep
nick: wks
extends: Entity
category: flow
description: A step in a `Walkthrough`.
$comment: |
  This is a type used in Stencila Schema for a single step within a
  [`Walkthrough`](./walkthrough.md).

  It exists so each revealed step can carry its own content, metadata, and
  progression behavior as a first-class node.

  Key properties include the step `content`, title or summary metadata, and any
  controls related to progression through the walkthrough.
status: beta
markdown:
  derive: false
required:
  - content
core:
  - isCollapsed
properties:
  isCollapsed:
    "@id": stencila:isCollapsed
    description: Whether this step is active (i.e. is encoded in source format and can be edited)
    type: boolean
  content:
    "@id": stencila:content
    description: The content of the step.
    type: array
    items:
      $ref: Block
    dom:
      elem: div
