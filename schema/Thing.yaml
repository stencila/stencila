title: Thing
"@id": schema:Thing
extends: Entity
category: other
description: The most generic type of item.
$comment: |
  This is an implementation of schema.org [`Thing`](https://schema.org/Thing).

  In Stencila Schema it provides the common base for schema.org-derived entities
  such as people, organizations, creative works, products, and related
  metadata-bearing types. Stencila keeps the broadly interoperable schema.org
  core while integrating it with the node and document infrastructure inherited
  through [`Entity`](./entity.md).

  Key properties include `name`, `alternateNames`, `description`, `identifiers`,
  `images`, and `url`.
properties:
  alternateNames:
    "@id": schema:alternateName
    description: Alternate names (aliases) for the item.
    type: array
    items:
      type: string
    strip: [metadata]
    serde:
      deserializeWith: option_csv_or_array
  description:
    "@id": schema:description
    description: A description of the item.
    type: string
    strip: [metadata]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  identifiers:
    "@id": schema:identifier
    description: Any kind of identifier for any kind of Thing.
    $comment: |
      Some identifiers have specific properties e.g the `issn` property for
      the `Periodical` type. These should be used in preference to this
      property which is intended for identifiers that do not yet have a
      specific property. Identifiers can be represented as strings, but
      using a `PropertyValue` will usually be better because it allows
      for `propertyID` (i.e. the type of identifier).
    type: array
    items:
      anyOf:
        - $ref: PropertyValue
        - type: string
    strip: [metadata]
  images:
    "@id": schema:image
    description: Images of the item.
    type: array
    items:
      $ref: ImageObject
    strip: [metadata]
  name:
    "@id": schema:name
    description: The name of the item.
    type: string
    strip: [metadata]
  url:
    "@id": schema:url
    description: The URL of the item.
    type: string
    format: uri
    strip: [metadata]
