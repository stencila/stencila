title: DateTime
'@id': schema:DateTime
nick: dti
extends: Entity
category: data
description: A combination of date and time of day in the form `[-]CCYY-MM-DDThh:mm:ss[Z|(+|-)hh:mm]`.
$comment: |
  This is an implementation of schema.org
  [`DateTime`](https://schema.org/DateTime).

  In Stencila Schema it is represented as a typed node so combined date-time
  values can be validated, serialized, and attached to document metadata and
  execution events. This is especially useful where timestamps need to remain
  distinct from plain strings.

  See also [`Date`](./date.md), [`Time`](./time.md), and
  [`Timestamp`](./timestamp.md).
jats:
  elem: date-time
  special: true
proptest: {}
required:
  - value
properties:
  value:
    '@id': 'schema:value'
    description: The date as an ISO 8601 string.
    type: string
    format: date-time
    proptest:
      min:
        description: Generate a fixed date-time string.
        value: String::from("2022-02-22T22:22:22")
      low:
        description: Generate a random date-time string.
        regex: '[0-9]{4}-[01][0-9]-[0-3][0-9]T[0-2][0-9]:[0-5][0-9]:[0-5][0-9]\.[0-9]+([+-][0-2][0-9]:[0-5][0-9]|Z)'
      high:
        description: Generate a random string of up to 20 alphanumeric characters, colons & hyphens.
        regex: '[a-zA-Z0-9\-:]{1,20}'
      max:
        description: Generate an arbitrary string.
        strategy: String::arbitrary()
