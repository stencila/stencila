title: SoftwareSourceCode
'@id': schema:SoftwareSourceCode
nick: ssc
extends: CreativeWork
category: works
description: Source code for software.
$comment: |
  This is an implementation of schema.org
  [`SoftwareSourceCode`](https://schema.org/SoftwareSourceCode).

  In Stencila Schema it is used for describing source-code artifacts as creative
  works, interoperating with schema.org while fitting into Stencila's richer
  document and execution ecosystem. It complements, rather than replaces, the
  code block and executable node types used for code inside documents.

  Key properties include `programmingLanguage`, `codeSampleType`,
  `runtimePlatform`, `softwareRequirements`, and `targetProducts`, with broader
  metadata inherited from [`CreativeWork`](./creative-work.md).
analogues:
  - id: schema:SoftwareSourceCode
  - name: SPDX package source metadata
    url: https://spdx.dev/specifications/
    notes: Approximate software-metadata analogue for describing source artifacts and their dependencies, though SPDX has a different focus and data model.
required:
  - name
  - programmingLanguage
core:
  - repository
  - path
  - commit
  - version
properties:
  programmingLanguage:
    '@id': schema:programmingLanguage
    description: |
      The computer programming language.
    type: string
  codeSampleType:
    '@id': schema:codeSampleType
    description: |
      What type of code sample: full (compile ready) solution, code snippet, inline code, scripts, template.
    type: string
  runtimePlatform:
    '@id': schema:runtimePlatform
    description: |
      Runtime platform or script interpreter dependencies (Example - Java v1,
      Python2.3, .Net Framework 3.0).
    type: array
    items:
      type: string
  softwareRequirements:
    '@id': schema:softwareRequirements
    description: Dependency requirements for the software.
    type: array
    items:
      anyOf:
        - $ref: SoftwareSourceCode
        - $ref: SoftwareApplication
        - type: string
  targetProducts:
    '@id': schema:targetProduct
    description: |
      Target operating system or product to which the code applies.
    type: array
    items:
      $ref: SoftwareApplication
