title: CitationMode
'@id': stencila:CitationMode
extends: Enumeration
category: prose
description: The presentation mode of a citation.
$comment: |
  This is an enumeration used in Stencila Schema for citation presentation modes.

  It exists so citations can preserve the distinction between parenthetical and
  narrative forms, including variants that expose only the author or only the
  year in surrounding prose. This helps Stencila map citation semantics
  consistently across authoring formats, renderers, and citation processors.

  See [`Citation.citationMode`](./citation.md#citationmode) for the property
  that uses this enumeration.
analogues:
  - name: CSL citation position and narrative conventions
    url: https://docs.citationstyles.org/en/stable/specification.html
    notes: Close analogue for distinctions such as parenthetical versus narrative citation rendering, though Stencila exposes them as a compact schema enumeration.
anyOf:
  - const: Parenthetical
    '@id': stencila:Parenthetical
  - const: Narrative
    '@id': stencila:Narrative
  - const: NarrativeAuthor
    '@id': stencila:NarrativeAuthor
  - const: NarrativeYear
    '@id': stencila:NarrativeYear
