title: EnumValidator
'@id': stencila:EnumValidator
nick: env
extends: Entity
category: data
description: A validator for a fixed set of allowed values.
$comment: |
  This is a type used in Stencila Schema for validating nodes against an enumerated
  set of values.

  It adapts the JSON Schema
  [`enum`](https://json-schema.org/draft/2019-09/json-schema-validation.html#rfc.section.6.1.2)
  concept to Stencila's validator system, allowing a value to be constrained to
  one of several explicitly listed node values.

  The main property is `values`.
markdown:
  derive: false
required:
  - values
properties:
  values:
    '@id': stencila:values
    description: A node is valid if it is equal to any of these values.
    type: array
    items:
      $ref: Node
    serde:
      # Avoid default `one_or_many` deserialize which can't be used for this array of primitives
      deserializeWith: none
    patch:
      formats: [md, smd, myst, ipynb, qmd]
