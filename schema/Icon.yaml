title: Icon
'@id': stencila:Icon
nick: ico
extends: Entity
category: prose
description: An icon, typically rendered using an icon font.
$comment: |
  This is a type used in Stencila Schema for icons embedded in document content.

  It exists so icons can be represented structurally and styled consistently
  across renderers rather than being reduced to opaque HTML or font markup. This
  supports document-authoring and publishing workflows that need portable icon
  references.

  Key properties identify the icon set, icon name, and any presentational hints
  needed by renderers.
analogues:
  - name: HTML icon element pattern
    url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/i
    notes: Approximate HTML analogue because icons are often represented using `<i>` or `<span>` with classes, but HTML has no dedicated semantic icon element.
dom:
  derive: false
markdown:
  derive: false
required:
  - name
core:
  - label
  - decorative
  - style
properties:
  name:
    '@id': schema:name
    description: The name of the icon e.g. "clock" or "lucide:clock".
    $comment: |
      Defaults to the "lucide" set if no set prefix is given (e.g. "clock" is
      equivalent to "lucide:clock"). Other icon sets can be used with an
      explicit prefix (e.g. "bi:alarm").
    type: string
  label:
    '@id': stencila:label
    description: An accessible text label for the icon.
    $comment: Rendered as `aria-label` on the DOM element so screen readers can announce the icon's meaning.
    type: string
  decorative:
    '@id': stencila:decorative
    description: Whether the icon is purely decorative.
    $comment: When true, the DOM element gets `aria-hidden="true"` so assistive technology skips it.
    type: boolean
  style:
    '@id': stencila:style
    description: Tailwind utility classes to apply to the icon.
    $comment: Used to style the icon when it is rendered in the DOM.
    type: string
