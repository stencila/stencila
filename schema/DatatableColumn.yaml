title: DatatableColumn
'@id': stencila:DatatableColumn
nick: dtc
extends: Entity
category: data
description: A column of data within a `Datatable`.
$comment: |
  This is a type used in Stencila Schema for a column within a
  [`Datatable`](./datatable.md).

  It exists to make column metadata, values, and inferred structure explicit
  instead of encoding tabular data only as rows of cells. This supports typed
  data access, validation, and richer integrations with analytical and
  executable workflows.

  Key properties include the column name, values, and any associated hints or
  validators.
dom:
  derive: false
required:
  - name
  - values
core:
  - validator
properties:
  name:
    "@id": stencila:name
    description: The name of the column.
    type: string
  values:
    '@id': stencila:values
    description: The data values of the column.
    $comment: |
      Previously, any `Node` type was allowed in values. However, for some implementations
      this was inefficient (e.g. in Rust a `enum Node` is >500 bytes whereas a `enum Primitive` is 32 bytes).
    type: array
    items:
      $ref: Primitive
    serde:
      # Avoid default `one_or_many` deserialize which can't be used for this array of primitives
      deserializeWith: none
  validator:
    '@id': stencila:validator
    description: The validator to use to validate data in the column.
    $ref: ArrayValidator
