title: Integer
'@id': schema:Integer
category: data
description: An integer value.
$comment: |
  This is an implementation of schema.org
  [`Integer`](https://schema.org/Integer).

  In Stencila Schema it is represented as a primitive node so integer values can
  be typed, validated, and serialized consistently across document metadata,
  parameters, and data structures.

  See also [`Number`](./number.md) and
  [`UnsignedInteger`](./unsigned-integer.md).
analogues:
  - id: schema:Integer
  - name: JSON integer-constrained number
    url: https://json-schema.org/understanding-json-schema/reference/numeric
    notes: Approximate analogue because JSON itself has only numbers, while integer-ness is usually enforced by JSON Schema or similar validators.
type: integer
