title: Article
"@id": schema:Article
extends: [CreativeWork, Executable]
category: works
description: An article, including news and scholarly articles.
$comment: |
  This is an implementation of schema.org
  [`Article`](https://schema.org/Article), extended in Stencila Schema for
  structured document content.

  In addition to schema.org article metadata, this type supports block-based
  document content, frontmatter, generated heading outlines, executable
  behavior, and archived nodes. This makes it suitable for authoring and
  publishing executable articles rather than only describing them as metadata.

  Key properties include `content`, `frontmatter`, `headings`, and `archive`.
  Additional metadata and execution features are inherited from
  [`CreativeWork`](./creative-work.md) and [`Executable`](./executable.md).
analogues:
  - id: schema:Article
    notes: Direct schema.org source type, extended in Stencila with executable and block-document semantics.
  - id: html:article
    notes: Closest HTML sectioning analogue for standalone article content.
  - id: jats:article
    notes: Closest JATS analogue for scholarly article structure.
  - id: pandoc:Pandoc
    notes: Approximate Pandoc analogue for a full document with metadata and block content, though Pandoc uses a top-level document type rather than an article-specific node.
dom:
  derive: false
html:
  elem: article
jats:
  special: true
  elem: article
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - title
  - authors
  - provenance
  - datePublished
  - abstract
  - references
  - frontmatter
properties:
  pageStart:
    "@id": schema:pageStart
    description: The page on which the article starts; for example "135" or "xiii".
    anyOf:
      - type: integer
      - type: string
    strip: [metadata]
  pageEnd:
    "@id": schema:pageEnd
    description: The page on which the article ends; for example "138" or "xvi".
    anyOf:
      - type: integer
      - type: string
    strip: [metadata]
  pagination:
    "@id": schema:pagination
    description: |
      Any description of pages that is not separated into pageStart and pageEnd;
      for example, "1-6, 9, 55".
    type: string
    strip: [metadata]
  frontmatter:
    "@id": stencila:frontmatter
    description: Frontmatter containing document metadata.
    $comment: Currently assumed to be YAML or JSON.
    type: string
    strip: [metadata]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  headings:
    "@id": stencila:headings
    description: A list of links to headings, including implied section headings, within the document
    $comment: |
      This list is automatically populated when the document is compiled.
      Each item in the list has (1) a `Link` to the heading, and (2) a nested list of subheadings.
    $ref: List
    strip: [content, temporary]
  content:
    "@id": stencila:content
    description: The content of the article.
    type: array
    items:
      $ref: Block
    strip: [content]
    proptest:
      min:
        description: Generate a single arbitrary block node
        strategy: vec_blocks(1)
      low:
        description: Generate up to two arbitrary block nodes
        strategy: vec_blocks(2)
      high:
        description: Generate up to four arbitrary block nodes
        strategy: vec_blocks(4)
      max:
        description: Generate up to eight arbitrary block nodes
        strategy: vec_blocks(8)
  archive:
    "@id": stencila:archive
    description: Nodes, usually from within `content` of the article, that have been archived.
    type: array
    items:
      $ref: Node
    strip: [content, archive]
  extra:
    "@id": stencila:extra
    description: Additional metadata for the article.
    $comment: |
      A catch-all for object properties of articles that are not in the Stencila schema.
    type: object
    strip: [metadata]
    serde:
      flatten: true
      deserializeWith: empty_object_is_none
    patch:
      formats: [md, smd, myst, ipynb, qmd, docx]
