title: QuoteInline
'@id': stencila:QuoteInline
nick: qti
extends: Mark
category: prose
description: Inline, quoted content.
$comment: |
  This is an inline mark type used in Stencila Schema for quoted content.

  It extends [`Mark`](./mark.md) so short quotations within prose can be
  represented structurally and serialized consistently across formats, rather
  than relying only on punctuation.

  Key properties are inherited from [`Mark`](./mark.md), especially the wrapped
  inline `content`.
jats:
  # Note that this is not a JATS standard element but we use it to
  # enable roundtrip testing (stripping `Quote` nodes does not work
  # because it can result in two adjacent text nodes which are concatenated
  # on the decode of the encode-decode roundtrip).
  elem: inline-quote
dom:
  elem: q
html:
  elem: q
markdown:
  template: '<q>{{content}}</q>'
proptest: {}
core:
  - source
properties:
  source:
    '@id': stencila:source
    description: The source of the quote.
    anyOf:
      - $ref: Citation
      - $ref: Text
