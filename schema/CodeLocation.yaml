title: CodeLocation
'@id': stencila:CodeLocation
nick: cdl
extends: Entity
category: flow
description: A location within source code.
$comment: |
  This is a type used in Stencila Schema for pointing to a location within source
  code.

  It exists to support diagnostics, references, provenance, and tooling
  integrations that need to connect document nodes back to specific code spans.
  By representing locations structurally, Stencila can preserve this information
  across serialization and execution workflows.

  Key properties identify the source, range, and positional information for the
  code span.
core:
  - source
  - startLine
  - startColumn
  - endLine
  - endColumn
properties:
  source:
    '@id': stencila:source
    description: The source of the code, a file path, label or URL.
    type: string
  startLine:
    '@id': stencila:startLine
    description: The 0-based index if the first line on which the error occurred.
    $ref: UnsignedInteger
  startColumn:
    '@id': stencila:startColumn
    description: The 0-based index if the first column on which the error occurred.
    $ref: UnsignedInteger
  endLine:
    '@id': stencila:endLine
    description: The 0-based index if the last line on which the error occurred.
    $ref: UnsignedInteger
  endColumn:
    '@id': stencila:endColumn
    description: The 0-based index if the last column on which the error occurred.
    $ref: UnsignedInteger
