title: TimeUnit
'@id': stencila:TimeUnit
extends: Enumeration
category: data
description: A unit in which time can be measured.
$comment: |
  This is an enumeration used in Stencila Schema for units of time.

  It exists to provide a controlled vocabulary for time-based quantities and
  durations where Stencila needs symbolic units rather than free-text
  abbreviations.

  See properties on duration- and time-related types that reference this
  enumeration.
analogues:
  - name: UCUM time units
    url: https://ucum.org/
    notes: Close controlled-vocabulary analogue for units of temporal measurement, though Stencila uses a compact fixed enumeration rather than coded unit strings.
default: Millisecond
proptest: {}
anyOf:
  - const: Year
    '@id': stencila:Year
  - const: Month
    '@id': stencila:Month
  - const: Week
    '@id': stencila:Week
  - const: Day
    '@id': stencila:Day
  - const: Hour
    '@id': stencila:Hour
  - const: Minute
    '@id': stencila:Minute
  - const: Second
    '@id': stencila:Second
  - const: Millisecond
    '@id': stencila:Millisecond
  - const: Microsecond
    '@id': stencila:Microsecond
  - const: Nanosecond
    '@id': stencila:Nanosecond
  - const: Picosecond
    '@id': stencila:Picosecond
  - const: Femtosecond
    '@id': stencila:Femtosecond
  - const: Attosecond
    '@id': stencila:Attosecond
