title: File
'@id': stencila:File
extends: CreativeWork
category: works
description: A file on the file system.
$comment: |
  This is a representation used in Stencila Schema for a file in the local or
  accessible file system.

  It extends [`CreativeWork`](./creative-work.md) so files can participate in
  the same metadata-rich document model as other works, while also carrying
  file-oriented information needed for includes, references, and workflow
  operations. It is used where the file itself is part of the document graph,
  not just a string path.

  Key properties include file path and media metadata, together with inherited
  identifiers and descriptive fields from [`CreativeWork`](./creative-work.md).
analogues:
  - name: POSIX file
    url: https://pubs.opengroup.org/onlinepubs/9699919799/
    notes: Close filesystem analogue for a file as a concrete resource addressed by path.
  - id: schema:MediaObject
    notes: Approximate web-metadata analogue when the file is also a media resource, though Stencila `File` is filesystem-oriented rather than URL-oriented.
required:
  - name
  - path
core:
  - mediaType
  - size
  - content
properties:
  name:
    '@id': schema:name
    description: The name of the file.
    type: string
  path:
    '@id': stencila:path
    description: The path (absolute or relative) of the file on the file system
    type: string
  mediaType:
    '@id': schema:encodingFormat
    aliases:
      - encodingFormat
    description: IANA media type (MIME type).
    $comment: |
      This property is more restrictive than https://schema.org/encodingFormat which
      expects either Text or URL for this property. This schema expects a media type e.g. `text/html`
      as listed at http://www.iana.org/assignments/media-types/media-types.xhtml.
    type: string
    pattern: '^\w+/[-+.\w]+$'
  transferEncoding:
    '@id': stencila:transferEncoding
    description: The encoding used for the context (e.g. base64, gz)
    $comment: |
      Similar to the HTTP Transfer-Encoding header (https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Transfer-Encoding).
      Mostly used to indicates whether the content of the file is Base64 encoded.
    type: string
  size:
    '@id': schema:size
    description: The size of the content in bytes
    $ref: UnsignedInteger
  content:
    '@id': schema:content
    description: The content of the file.
    $comment: |
      For binary formats, such as images, the content should be Base64 encoded.
    type: string
    dom:
      skip: true
