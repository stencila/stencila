title: ListItem
"@id": schema:ListItem
nick: lsi
extends: Thing
category: prose
description: A single item in a list.
$comment: |
  This is an implementation of schema.org
  [`ListItem`](https://schema.org/ListItem), extended in Stencila Schema for
  document-oriented list content.

  In addition to the schema.org model, it supports block `content` for rich list
  items and `isChecked` for task-list semantics. This makes it suitable for
  ordinary prose lists as well as checklists and mixed-content document lists.

  Key properties include `content`, `item`, `isChecked`, and `position`.
html:
  elem: li
jats:
  elem: list-item
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - item
  - isChecked
  - position
properties:
  content:
    "@id": stencila:content
    description: The content of the list item.
    $comment: Use either `content` or `item`, not both.
    type: array
    items:
      $ref: Block
    dom:
      elem: li
    proptest:
      min: 
        description: Generate a single, arbitrary, paragraph
        strategy: vec_paragraphs(1)
      low:
        description: Generate one, arbitrary, non-list block
        strategy: vec_blocks_list_item(1)
      high:
        description: Generate up to two, arbitrary, non-list blocks
        strategy: vec_blocks_list_item(2)
      max:
        description: Generate up to four, arbitrary, non-list blocks
        strategy: vec_blocks_list_item(4)
  item:
    "@id": schema:item
    description: The item represented by this list item.
    $comment: Use either `item` or `content`, not both.
    $ref: Node
  isChecked:
    "@id": stencila:isChecked
    description: A flag to indicate if this list item is checked.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      attr: is-checked
  position:
    "@id": schema:position
    description: The position of the item in a series or sequence of items.
    type: integer
    jats:
      attr: position
