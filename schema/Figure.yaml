title: Figure
'@id': stencila:Figure
extends: CreativeWork
category: works
description: A figure.
$comment: |
  This is a figure type used in Stencila Schema, analogous to figure containers in
  HTML, JATS, and scholarly publishing systems.

  It extends [`CreativeWork`](./creative-work.md) so figures can carry rich
  metadata, authorship, captions, and provenance, while also adding
  document-oriented support for multi-panel layout and SVG overlays. This makes
  it suitable for executable and annotated figures, not just static media
  wrappers.

  Key properties include `content`, `caption`, `label`, `layout`, `padding`, and
  `overlay`. Additional metadata and provenance features are inherited from
  [`CreativeWork`](./creative-work.md).
dom:
  derive: false
html:
  elem: figure
jats:
  elem: fig
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - label
  - labelAutomatically
  - caption
  - authors
  - provenance
properties:
  label:
    '@id': stencila:label
    description: A short label for the figure.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      elem: label
    proptest:
      min:
        description: No label
        value: None
      low:
        description: Generate a simple label
        strategy: option::of(r"[a-zA-Z0-9]+")
      max:
        description: Generate an arbitrary string
        strategy: option::of(String::arbitrary())
  labelAutomatically:
    '@id': stencila:labelAutomatically
    description: Whether the label should be automatically updated.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  caption:
    '@id': schema:caption
    description: A caption for the figure.
    type: array
    items:
      $ref: Block
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      elem: figcaption
    jats:
      elem: caption
    proptest:
      min:
        description: No caption
        value: None
      low:
        description: Generate up to two arbitrary paragraphs.
        strategy: option::of(vec_paragraphs(2))
      max:
        description: Generate up to three arbitrary, non-recursive, block nodes.
        strategy: option::of(vec_blocks_non_recursive(3))
  layout:
    '@id': stencila:layout
    description: |
      Layout for arranging content blocks in a multi-panel figure.
      When absent, content blocks stack vertically with no grid.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  padding:
    '@id': stencila:padding
    description: |
      Padding around the figure's content area in pixel units.
      Creates whitespace where overlay annotations can be placed
      outside the image bounds. Accepts 1, 2, or 4 space-separated
      values following CSS shorthand order (all, vertical/horizontal,
      or top/right/bottom/left).
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  overlay:
    '@id': stencila:overlay
    description: |
      An optional SVG overlay rendered on top of the figure's content.
      The SVG is positioned absolutely over the content area and scales
      proportionally using the SVG viewBox. Used for annotations such as
      arrows, callouts, bounding boxes, and labels.
    type: string
    walk: false
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  overlayCompiled:
    '@id': stencila:overlayCompiled
    description: |
      The compiled SVG overlay with all custom elements expanded to
      standard SVG. Generated during compilation from the overlay
      source. When present, renderers use this instead of overlay.
    type: string
    strip: [output]
    patch:
      formats: []
  compilationDigest:
    '@id': stencila:compilationDigest
    description: A digest of the `overlay` property.
    $comment: Used to avoid unnecessary recompilation of the overlay.
    $ref: CompilationDigest
    strip: [compilation]
  compilationMessages:
    '@id': stencila:compilationMessages
    description: Messages generated while compiling the overlay.
    type: array
    items:
      $ref: CompilationMessage
    strip: [compilation]
  content:
    '@id': stencila:content
    description: The content of the figure.
    type: array
    items:
      $ref: Block
    dom:
      elem: figure
    proptest:
      min:
        description: Generate a single arbitrary block image object.
        strategy: vec_blocks_image_object(1)
      low:
        description: Generate up to two arbitrary, non-recursive, block nodes (excluding code chunks).
        strategy: vec_blocks_figure_content(2)
      max:
        description: Generate up to four arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(4)
