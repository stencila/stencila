title: Claim
'@id': schema:Claim
nick: clm
extends: CreativeWork
category: works
description: A reviewable claim or statement.
$comment: |
  This is an implementation of schema.org [`Claim`](https://schema.org/Claim),
  adapted in Stencila Schema for block-level document content.

  It is used for claim-like units that authors, reviewers, and readers may want
  to identify, label, or assess explicitly, such as assertions, theorems,
  propositions, or proofs. Unlike a plain paragraph, a claim can carry a claim
  type, structured block content, and document-oriented labeling metadata.

  Key properties include `claimType`, `label`, and `content`.
analogues:
  - id: schema:Claim
    notes: Direct schema.org source type, adapted in Stencila to carry block content and document labeling.
  - id: jats:statement
    notes: Closest JATS analogue for labeled or typed statement-like content.
  - id: myst:directive:admonition
    notes: Only an approximate authoring analogue; claims may be represented in markup as typed callout blocks, but Stencila gives them dedicated claim semantics.
jats:
  elem: statement
markdown:
  derive: false
proptest: {}
required:
  - claimType
  - content
core:
  - label
  - authors
  - provenance
properties:
  claimType:
    '@id': stencila:claimType
    description: The type of the claim.
    $ref: ClaimType
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      attr: content-type
  label:
    '@id': stencila:label
    description: A short label for the claim.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      elem: label
  content:
    '@id': stencila:content
    description: Content of the claim, usually a single paragraph.
    $comment: |
      Most claims will have a single paragraph but could have multiple
      paragraphs, tables and even figures.
    type: array
    items:
      $ref: Block
    dom:
      elem: aside
    proptest:
      min:
        description: Generate a single arbitrary paragraph.
        strategy: vec_paragraphs(1)
      low:
        description: Generate up to two arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(4)
