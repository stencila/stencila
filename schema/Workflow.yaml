title: Workflow
"@id": stencila:Workflow
nick: wfl
extends: CreativeWork
category: works
description: An AI workflow definition.
$comment: |
  This is a type used in Stencila Schema for reusable AI workflow definitions.

  It exists to represent a workflow as a document-like artifact with metadata,
  human-readable guidance, and a machine-executable pipeline defined in Graphviz
  DOT. Workflows are discovered from `.stencila/workflows/<name>/WORKFLOW.md`
  and can reference agents by name, allowing shared workflow structures to be
  combined with workspace or user-level agent definitions.

  Key properties include `name`, `content`, `pipeline`, `goal`, `goalHint`, and
  `overrides`.
markdown:
  derive: false
required:
  - name
  - description
core:
  - whenToUse
  - whenNotToUse
  - frontmatter
  - content
  - pipeline
  - goal
  - goalHint
properties:
  name:
    "@id": schema:name
    description: The name of the workflow.
    $comment: |
      Must be lowercase kebab-case: 1-64 characters, only lowercase alphanumeric
      and hyphens, no leading/trailing/consecutive hyphens. By convention, names
      describe the workflow's purpose, e.g. `code-review`, `test-and-deploy`,
      `plan-implement-validate`.
    type: string
    pattern: '^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$'
    patch:
      formats: [md, myst, qmd, smd]
  whenToUse:
    '@id': stencila:whenToUse
    description: Positive selection signals describing when this workflow should be used.
    type: array
    items:
      type: string
    strip: [metadata]
    serde:
      deserializeWith: option_one_or_many
  whenNotToUse:
    '@id': stencila:whenNotToUse
    description: Negative selection signals describing when this workflow should not be used.
    type: array
    items:
      type: string
    strip: [metadata]
    serde:
      deserializeWith: option_one_or_many
  frontmatter:
    "@id": stencila:frontmatter
    description: Frontmatter containing workflow metadata.
    $comment: Currently assumed to be YAML.
    type: string
    strip: [metadata]
    patch:
      formats: [md, myst, qmd, smd]
  content:
    "@id": stencila:content
    description: The content of the workflow (Markdown body containing the DOT pipeline and documentation).
    $comment: |
      When present, the Markdown body should contain at least one ```dot fenced code block
      defining the pipeline digraph. Additional Markdown content serves as human-readable
      documentation. The first ```dot code block is extracted as the pipeline definition during
      decoding. For in-memory workflows, content may be omitted if the pipeline property is
      set directly.
    type: array
    items:
      $ref: Block
    dom:
      elem: section
  pipeline:
    "@id": stencila:pipeline
    description: The raw DOT source defining the pipeline digraph.
    $comment: |
      Extracted from the first ```dot fenced code block in the content during decoding.
      Can also be set directly for programmatic workflow construction. When encoding to
      Markdown, the pipeline string is embedded as a ```dot code block in the content.

      The DOT source must define a single `digraph` with exactly one start node
      (shape=Mdiamond) and one exit node (shape=Msquare). Nodes use the `agent` attribute
      to reference agent definitions by name, e.g. `implement [agent="code-engineer"]`.
    type: string
  goal:
    "@id": stencila:goal
    description: A fixed, predetermined high-level goal for the pipeline.
    $comment: |
      Use only when the workflow has a stable objective that does not change between runs.
      Exposed as `$goal` in node prompt templates and mirrored into the run context as
      `graph.goal`. Maps to the `goal` graph-level attribute in the Attractor specification.
      Most workflows expect the user to supply their own goal at run time; for those
      workflows, use `goalHint` instead.
    type: string
  goalHint:
    "@id": stencila:goalHint
    description: Hint text displayed in user interfaces to guide the user to provide a specific goal.
    $comment: |
      Most workflows should include this because most workflows expect the user to supply
      their own objective at run time. The text is shown as a prompt or hint across user
      interfaces (TUI, web, email, Slack, etc.) when the workflow is activated. The user's
      response becomes `$goal` at runtime. This field is a UI hint only and is never
      substituted into prompts directly.
    type: string
  overrides:
    "@id": stencila:overrides
    description: CSS-like rules for per-node agent overrides across the pipeline.
    $comment: |
      The main mechanism for configuring agent behavior is through agent definitions
      referenced via the `agent` attribute on each node. The overrides property provides
      a supplementary mechanism for bulk per-node agent overrides by class or ID — useful
      when you want to adjust model, provider, or other agent settings across many nodes
      without modifying individual agent definitions or adding `agent.*` attributes to
      every node. For example:

        overrides: |
          * { model: claude-sonnet-4-5 }
          .critical { reasoning_effort: high }
          #review { model: gpt-5.2; provider: openai }

      Specificity order: `*` (universal) < `.class` < `#id`. Override values are
      overridden by explicit `agent.*` node attributes. Maps to the `model_stylesheet`
      graph-level attribute in the Attractor specification.
    type: string
  defaultMaxRetry:
    "@id": stencila:defaultMaxRetry
    description: Global retry ceiling for nodes that omit max_retries.
    $comment: |
      Defaults to 50 per the Attractor specification. Maps to the `default_max_retry`
      graph-level attribute.
    type: integer
  retryTarget:
    "@id": stencila:retryTarget
    description: Node ID to jump to if exit is reached with unsatisfied goal gates.
    $comment: |
      Maps to the `retry_target` graph-level attribute in the Attractor specification.
    type: string
  fallbackRetryTarget:
    "@id": stencila:fallbackRetryTarget
    description: Secondary jump target if retryTarget is missing or invalid.
    $comment: |
      Maps to the `fallback_retry_target` graph-level attribute.
    type: string
  defaultFidelity:
    "@id": stencila:defaultFidelity
    description: Default context fidelity mode for LLM sessions.
    $comment: |
      Controls how context values are compressed or summarized for LLM prompts.
      Valid values: "full", "truncate", "compact", "summary:low", "summary:medium",
      "summary:high". Maps to the `default_fidelity` graph-level attribute.
    type: string
