title: ObjectHint
'@id': stencila:ObjectHint
nick: obh
extends: Entity
category: data
description: A concise summary of the structure of an `Object`.
$comment: |
  This is a type used in Stencila Schema for providing a concise summary of the
  structure of an [`Object`](./object.md).

  It exists to support both human and machine understanding of keyed data,
  including schema inference, editing assistance, and code generation
  workflows. Rather than imposing hard validation constraints, it summarizes
  observed or inferred characteristics that can help tools and readers work with
  object-shaped data.

  Key properties describe expected keys, per-key hints, and overall object
  characteristics.
required:
  - length
  - keys
  - values
properties:
  length:
    "@id": stencila:length
    description: The number of entries in the object.
    $comment: |
      For large object with many entries, to save space, `keys` and `values` may not be
      complete (i.e. they may have lengths less than this `length` property).
    type: integer
    minimum: 0
  keys:
    '@id': stencila:keys
    description: The keys of the object's entries.
    type: array
    items:
      type: string
  values:
    '@id': stencila:values
    description: Hints to the values of the object's entries.
    type: array
    items:
      $ref: Hint
