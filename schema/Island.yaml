title: Island
"@id": stencila:Island
extends: Entity
category: other
description: An island of content in a document.
$comment: |
  This is a type used in Stencila Schema for an isolated region of document content.

  It exists to represent content that is handled with its own compilation,
  rendering, or interaction boundary while still remaining inside the broader
  document model. This is useful for embedded applications, custom renderers, or
  sandboxed content regions.

  Key properties describe the island content, source, and any execution or
  rendering context associated with it.
latex:
  derive: false
proptest: {}
required:
  - content
core:
  - isAutomatic
  - isContinuation
  - labelType
  - label
  - labelAutomatically
  - otherIds
  - style
properties:
  content:
    "@id": stencila:content
    description: The content within the section.
    type: array
    items:
      $ref: Block
    dom:
      elem: section
  isAutomatic:
    '@id': stencila:isAutomatic
    description: Whether the island is automatically generated.
    $comment: |
      When the `--island-wrap` decoding option is used and the island has been
      automatically generated by wrapping a document element, then this will be true.
      Used when encoding the island back to the source format to determine whether
      the explicit island syntax is required or not.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
  isContinuation:
    "@id": stencila:isContinuation
    description: Whether the island is a continuation of a previous island.
    $comment: |
      When true, the island shares the label number of the most recent island
      of the same label type, rather than incrementing the counter. This maps
      to the LaTeX `\ContinuedFloat` command from the `caption` package.
    type: boolean
    patch:
      formats: [latex]
  labelType:
    "@id": stencila:labelType
    description: The type of the label for the island.
    $comment: |
      Used during automatic sequential numbering of figures and tables within the document.
    $ref: LabelType
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
  label:
    "@id": stencila:label
    description: A short label for the chunk.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
  labelAutomatically:
    "@id": stencila:labelAutomatically
    description: Whether the label should be automatically updated.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
  otherIds:
    "@id": stencila:otherIds
    description: Other IDs for the island, in addition to the primary `id`.
    $comment: |
      Used to register secondary IDs (e.g. subfigure labels) as link targets.
      The primary `id` is typically the last label (main figure/table label),
      and these other IDs are also registered for cross-referencing.
    type: array
    items:
      type: string
    patch:
      formats: [latex]
  style:
    "@id": stencila:style
    description: The style to apply to the island.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
