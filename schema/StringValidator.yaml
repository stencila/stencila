title: StringValidator
'@id': stencila:StringValidator
nick: stv
extends: Entity
category: data
description: A validator for string values.
$comment: |
  This is a type used in Stencila Schema for validating [`String`](./string.md)
  nodes.

  It adapts common JSON Schema string constraints to Stencila's validator
  system, allowing length limits and pattern checks to be expressed as
  structured validator nodes.

  Key properties include `minLength`, `maxLength`, and `pattern`.
markdown:
  derive: false
core:
  - minLength
  - maxLength
  - pattern
properties:
  minLength:
    '@id': stencila:minLength
    type: integer
    minimum: 0
    description: The minimum length for a string node.
    $comment: |
      A string is valid if its length is greater than, or exactly equal to, `minLength`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  maxLength:
    '@id': stencila:maxLength
    type: integer
    minimum: 0
    description: The maximum length for a string node.
    $comment: |
      A string is valid if its length is less than, or exactly equal to, `maxLength`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  pattern:
    '@id': stencila:pattern
    type: string
    description: A regular expression that a string node must match.
    $comment: |
      A string is valid if it is matched by the regular expression.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
