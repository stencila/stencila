title: Text
"@id": schema:Text
nick: txt
extends: Entity
category: prose
description: A text node.
$comment: |
  This is an implementation of schema.org [`Text`](https://schema.org/Text),
  adapted in Stencila Schema as a node type rather than a primitive string.

  It exists so textual content can participate in the document tree with its own
  identity and metadata, which is useful for diffing, editing, and collaborative
  workflows. This differs from the primitive [`String`](./string.md) type, which
  represents plain scalar string values outside the node model.

  The main property is `value`.
dom:
  derive: false
html:
  elem: span
jats:
  special: true
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - value
core:
  - compilationMessages
properties:
  value:
    "@id": "schema:value"
    description: The value of the text content
    $ref: Cord
    patch:
      formats: [all]
    dom:
      elem: none
    html:
      content: true
    proptest:
      min:
        description: Generate a fixed string of text.
        value: Cord::from("text")
      low:
        description: Generate a random string of up to 10 alphanumeric characters.
        strategy: r"[a-zA-Z0-9]{1,10}".prop_map(Cord::from)
      high:
        description: Generate a random string of up to 100 alphanumeric characters, some special characters commonly used in prose, and whitespace.
        strategy: r"[a-zA-Z0-9 \t\-_.!?*+-/()'<>=]{1,100}".prop_map(Cord::from)
      max:
        description: Generate an arbitrary string.
        strategy: String::arbitrary().prop_map(Cord::from)
  compilationMessages:
    "@id": stencila:compilationMessages
    description: Messages generated while compiling the text.
    strip: [compilation]
    type: array
    items:
      $ref: CompilationMessage
