title: ContactPoint
'@id': schema:ContactPoint
extends: Thing
category: other
description: A contact point, usually within an organization.
$comment:
  This is an implementation of schema.org
  [`ContactPoint`](https://schema.org/ContactPoint), adapted in Stencila Schema
  for structured contact metadata.

  It is used for correspondence and contact details associated with people,
  organizations, and related entities, while fitting into Stencila's broader
  node model.

  Key properties include `emails`, `telephoneNumbers`, and
  `availableLanguages`.
analogues:
  - id: schema:ContactPoint
core:
  - emails
  - telephoneNumbers
properties:
  emails:
    '@id': schema:email
    description: Email address for correspondence.
    type: array
    items:
      type: string
      format: email
    serde:
      deserializeWith: option_csv_or_array
  telephoneNumbers:
    '@id': schema:telephone
    aliases:
      - telephone
    description: Telephone numbers for the contact point.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_array
  availableLanguages:
    '@id': schema:availableLanguage
    description: |
      Languages (human not programming) in which it is possible to communicate
      with the organization/department etc.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_array
