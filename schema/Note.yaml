title: Note
'@id': stencila:Note
extends: Entity
category: prose
description: A note associated with document content.
$comment: |
  This is a type used in Stencila Schema for notes attached to document content.

  It exists to represent note content structurally so it can be rendered as a
  footnote, endnote, sidenote, or similar document note, depending on the target
  format and note type. This preserves note semantics across transformations
  rather than reducing them to plain text markers.

  Key properties include `noteType` and `content`.
analogues:
  - id: html:aside
    notes: Approximate HTML analogue for note content, though HTML has no dedicated footnote or endnote element and placement semantics are not built in.
  - id: jats:fn
    notes: Closest JATS analogue for document notes, particularly footnotes.
  - id: pandoc:Note
    notes: Closest Pandoc analogue for inline-referenced notes; Stencila additionally records note placement semantics explicitly via `noteType`.
  - id: mdast:FootnoteDefinition
    notes: Close MDAST analogue for defined footnote content, although MDAST models note references and definitions separately and does not cover sidenotes directly.
jats:
  elem: fn
  attrs:
    # Use the `custom-type` attribute to encode the `noteType`
    # See https://jats.nlm.nih.gov/articleauthoring/tag-library/1.3/attribute/fn-type.html
    fn-type: custom
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - noteType
  - content
properties:
  noteType:
    '@id': stencila:noteType
    description: Determines where the note content is displayed within the document.
    $ref: NoteType
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      attr: custom-type
    proptest:
      min:
        description: Fixed footnote type.
        value: NoteType::Footnote
      high:
        description: Generate an arbitrary note type.
        strategy: NoteType::arbitrary()
  content:
    '@id': stencila:content
    description: Content of the note, usually a paragraph.
    $comment: |
      Most notes will have a single paragraph but could have multiple
      paragraphs, tables and even figures.
    type: array
    items:
      $ref: Block
    dom:
      elem: aside
    proptest:
      min:
        description: Generate a single paragraph (with no `Note` to avoid recursion).
        value: vec![p([t("Note paragraph")])]
