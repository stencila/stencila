title: ExecutionMode
'@id': stencila:ExecutionMode
extends: Enumeration
category: flow
description: The circumstances under which a node should be executed.
$comment: |
  This is an enumeration used in Stencila Schema controlling when executable nodes
  should run.

  It exists so execution policy can be represented consistently across code,
  prompts, forms, and other executable nodes. Using a controlled vocabulary
  allows tools and renderers to agree on execution behavior without
  format-specific conventions.

  See [`Executable.executionMode`](./executable.md#executionmode) for the main
  property that uses this enumeration.
default: Need
anyOf:
  - const: Demand
    '@id': stencila:Demand
    description: |
      Execute on demand only.
  - const: Need
    '@id': stencila:Need
    description: |
      Execute on demand and, if the node is stale, when the document or ancestor node is executed.
  - const: Always
    '@id': stencila:Always
    description: |
      Execute on demand and whenever the document or ancestor node is executed.
      Use this for nodes that you want to always be executed, even if they, or
      their upstream dependencies, are not stale.
  - const: Auto
    '@id': stencila:Auto
    description: |
      Execute on demand, and automatically if it is stale, including if is an upstream dependency of a node
      that is to be executed, or is a downstream dependant of a node that has been executed.
  - const: Lock
    '@id': stencila:Lock
    description: |
      Do not execute the node. Requires that the node is unlocked first to be executed.
