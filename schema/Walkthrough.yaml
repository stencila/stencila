title: Walkthrough
"@id": stencila:Walkthrough
nick: wkt
extends: Entity
category: flow
description: An interactive walkthrough.
$comment: |
  This is a type used in Stencila Schema for interactive walkthroughs embedded in
  documents.

  It exists to support guided, stepwise experiences for readers and authors,
  with each step represented as structured document content rather than external
  application logic. This makes walkthroughs portable across Stencila tools and
  publishable outputs.

  Key properties include the ordered `steps` and any metadata controlling
  progression or presentation.
status: beta
patch:
  applyWith: "Walkthrough::apply_with"
markdown:
  derive: false
required:
  - steps
core:
  - isCollapsed
properties:
  isCollapsed:
    "@id": stencila:isCollapsed
    description: Whether the walkthrough is collapsed
    $comment: |
      By default, walkthroughs are expanded and all steps that have been activated
      are able to be edited. By setting this property to `true`, all steps in the walkthrough
      are collapsed and edits to step content will be applied to the step.
    type: boolean
  steps:
    "@id": stencila:steps
    description: The steps making up the walkthrough.
    type: array
    items:
      $ref: WalkthroughStep
    walk: true
    patch:
      formats: [all]
    dom:
      elem: div
