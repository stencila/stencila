title: MessageLevel
'@id': stencila:MessageLevel
extends: Enumeration
description: A severity level for a message.
$comment: |
  This is an enumeration used in Stencila Schema for diagnostic severity levels.

  It exists so compilation, execution, and other message-producing workflows can
  communicate severity in a consistent way across tools and renderers.

  See [`CompilationMessage`](./compilation-message.md) and
  [`ExecutionMessage`](./execution-message.md) for the main types that use this
  enumeration.
anyOf:
  - const: Trace
    '@id': stencila:Trace
    description: A tracing message
  - const: Debug
    '@id': stencila:Debug
    description: A debug message
  - const: Info
    '@id': stencila:Info
    description: An information message
  - const: Warning
    '@id': stencila:Warning
    description: A warning message
  - const: Error
    '@id': stencila:Error
    description: An error message
  - const: Exception
    '@id': stencila:Exception
    description: An exception message
    $comment: |
      Differs from an error in that it causes execution to be interrupted.
      In contrast, an error message can arise from a source, a log emitter for example,
      which does not interrupt execution.
