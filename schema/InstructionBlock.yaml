title: InstructionBlock
"@id": stencila:InstructionBlock
nick: isb
extends: Instruction
category: edits
description: An instruction to edit some block content.
$comment: |
  This is a block-level instruction type used in Stencila Schema.

  It extends [`Instruction`](./instruction.md) for editing or generating block
  content within a document. By distinguishing block-level instructions from
  inline ones, Stencila can apply different targeting, rendering, and suggestion
  behaviors while reusing the common instruction model.

  Key properties are mostly inherited from [`Instruction`](./instruction.md),
  with semantics focused on block-content targets and suggestions.
patch:
  derive: false
dom:
  derive: false
markdown:
  derive: false
proptest: {}
core:
  - content
  - suggestions
  - activeSuggestion
properties:
  content:
    "@id": stencila:content
    description: The content to which the instruction applies.
    type: array
    items:
      $ref: Block
    walk: true
    dom:
      elem: div
    proptest:
      min:
        description: No content
        value: None
      low:
        description: Generate a single arbitrary, non-recursive, block node
        strategy: option::of(vec_blocks_non_recursive(1))
      high:
        description: Generate up to two arbitrary, non-recursive, block nodes
        strategy: option::of(vec_blocks_non_recursive(2))
      max:
        description: Generate up to four arbitrary, non-recursive, block nodes
        strategy: option::of(vec_blocks_non_recursive(4))
  suggestions:
    "@id": stencila:suggestions
    description: Suggestions for the instruction
    type: array
    items:
      $ref: SuggestionBlock
    walk: true
    dom:
      elem: div
