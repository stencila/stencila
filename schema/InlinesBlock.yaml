title: InlinesBlock
'@id': stencila:InlinesBlock
nick: inb
extends: Entity
category: prose
description: A block containing inlines with no other semantics.
$comment: |
  This is a block type used in Stencila Schema for inline content without paragraph
  semantics.

  It exists to wrap inline content as a block when a container requires block
  structure but a full paragraph would introduce misleading semantics or
  spacing. It is especially useful during coarse decoding and similar workflows
  that need a minimal block wrapper around executable inline content.

  Key properties include the inline `content`.
analogues:
  - id: html:div
    notes: Closest HTML container analogue for grouping inline content without paragraph semantics.
  - id: pandoc:Plain
    notes: Closest Pandoc block analogue for inline content that is block-positioned but not paragraph-like.
  - id: mdast:Paragraph
    notes: Only an approximate MDAST analogue because Markdown commonly uses paragraphs for inline block content and has no dedicated semantics-free inline block wrapper.
required:
  - content
properties:
  content:
    '@id': stencila:content
    description: The contents of the block.
    type: array
    items:
      $ref: Inline
    dom:
      elem: div
