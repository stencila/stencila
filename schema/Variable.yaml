title: Variable
'@id': stencila:Variable
extends: Entity
category: flow
status: alpha
description: A named value.
$comment: |
  This is a type used in Stencila Schema for named values in executable and structured
  content.

  It exists to pair a symbolic name with a value within the document model,
  supporting computation, templating, and data exchange workflows. Representing
  variables structurally makes them easier to inspect, validate, and serialize
  than ad hoc key-value text.

  Key properties include the variable `name` and `value`, along with any
  associated metadata or hints.
analogues:
  - name: programming language variable binding
    url: https://en.wikipedia.org/wiki/Variable_(computer_science)
    notes: Close conceptual analogue for a named value, though Stencila exposes variables as document-model nodes with type hints and serialization semantics.
required:
  - name
core:
  - programmingLanguage
  - nativeType
  - nodeType
properties:
  name:
    '@id': schema:name
    description: The name of the variable.
    type: string
    pattern: '[a-zA-Z][a-zA-Z0-9_]*'
    $comment: |
      This regex allows for snake_case and camelCase names but excludes
      PascalCase for names.
  programmingLanguage:
    '@id': schema:programmingLanguage
    type: string
    description: The programming language that the variable is defined in e.g. Python, JSON.
  nativeType:
    '@id': stencila:nativeType
    type: string
    description: The native type of the variable e.g. `float`, `datetime.datetime`, `pandas.DataFrame`
  nodeType:
    '@id': stencila:nodeType
    type: string
    description: The Stencila node type of the variable e.g. `Number`, `DateTime`, `Datatable`.
  value:
    '@id': schema:value
    description: The value of the variable.
    $ref: Node
  hint:
    '@id': stencila:hint
    description: A hint to the value and/or structure of the variable.
    $ref: Hint
  nativeHint:
    '@id': stencila:nativeHint
    description: A textual hint to the value and/or structure of the variable.
    $comment: |
      Can be used instead of, or in addition to, `hint` to provide less structured, but potentially more informative,
      summaries of the variable usually generated within the programming language environment e.g. using R's `summary` function.
    type: string
