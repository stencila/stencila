title: SuggestionType
"@id": stencila:SuggestionType
extends: Enumeration
category: edits
description: A category of suggested edit.
$comment: |
  This is an enumeration used in Stencila Schema for the kind of suggested edit.

  It exists to classify whether a suggestion inserts, deletes, or modifies
  content so tools can render and apply suggestions consistently.

  See the type properties on [`Suggestion`](./suggestion.md) and derived
  suggestion nodes for where this enumeration is used.
anyOf:
  - const: Insert
    "@id": stencila:Insert
    description: The suggestion is an insertion of new content.
  - const: Delete
    "@id": stencila:Delete
    description: The suggestion is a deletion of existing content.
  - const: Replace
    "@id": stencila:Replace
    description: The suggestion is a replacement of existing content with new content.
