title: CitationGroup
"@id": stencila:CitationGroup
nick: ctg
extends: Entity
category: prose
description: A group of `Citation` nodes.
$comment: |
  This is a type used in Stencila Schema for grouped citations.

  It exists to represent multiple related [`Citation`](./citation.md) nodes as a
  single inline unit when the surrounding text cites several references at once.
  This allows citation processors and renderers to generate a combined rendered
  form, including ranges and grouping punctuation, while preserving the
  individual citation items structurally.

  Key properties include `items` and the generated `content` rendering.
jats:
  special: true
latex:
  derive: false
markdown:
  derive: false
required:
  - items
core:
  - content
properties:
  items:
    "@id": schema:itemListElement
    description: One or more `Citation`s to be referenced in the same surrounding text.
    type: array
    items:
      $ref: Citation
    walk: true
    patch:
      formats: [all]
  content:
    "@id": stencila:content
    description: A rendering of the citation group using the citation style of the document.
    $comment: |
      Generated from the citation items during compilation and includes range characters
      and parentheses e.g. [1-4,7]
    type: array
    items:
      $ref: Inline
    walk: false
    dom:
      elem: span
