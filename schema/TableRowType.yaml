title: TableRowType
'@id': stencila:TableRowType
extends: Enumeration
category: works
description: The structural role of a table row.
$comment: |
  This is an enumeration used in Stencila Schema for the structural role of a table
  row.

  It exists so rows can be identified as header, body, or footer rows using a
  stable vocabulary that maps cleanly across formats.

  See [`TableRow.rowType`](./table-row.md#rowtype) for the property that uses
  this enumeration.
analogues:
  - name: HTML table section semantics
    url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/table
    notes: Approximate analogue because HTML distinguishes header, body, and footer by row groups such as `<thead>`, `<tbody>`, and `<tfoot>` rather than a row-type enumeration.
proptest: {}
default: BodyRow
anyOf:
  - const: HeaderRow
    '@id': stencila:HeaderRow
  - const: BodyRow
    '@id': stencila:BodyRow
  - const: FooterRow
    '@id': stencila:FooterRow
