title: CodeStatic
'@id': stencila:CodeStatic
extends: Entity
category: code
abstract: true
description: An abstract base type for non-executable code nodes.
$comment: |
  This is an abstract base type used in Stencila Schema for non-executable code nodes.

  It exists to represent code as document content without normal execution
  semantics, while still preserving source text, programming language,
  authorship, and provenance metadata. This provides a common foundation for
  static code blocks and inline code.

  Key properties include `code`, `programmingLanguage`, `authors`, and
  `provenance`.
required:
  - code
core:
  - programmingLanguage
  - authors
  - provenance
properties:
  code:
    '@id': stencila:code
    description: The code.
    $ref: Cord
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex, lexical, koenig]
    jats:
      content: true
    html:
      content: true
    proptest:
      min:
        description: Generate a simple fixed string of code.
        value: Cord::from("code")
      low:
        description: |
          Generate a random string of up to 10 alphanumeric characters (exclude whitespace which
          can be problematic in Markdown).
        strategy: r"[a-zA-Z0-9]{1,10}".prop_map(Cord::from)
      high:
        description: |
          Generate a random string of up to 100 characters (excluding control characters).
        strategy: r"[^\p{C}]{1,100}".prop_map(Cord::from)
      max:
        description: Generate an arbitrary string.
        strategy: String::arbitrary().prop_map(Cord::from)
  programmingLanguage:
    '@id': schema:programmingLanguage
    description: The programming language of the code.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex, lexical, koenig]
    jats:
      attr: language
    proptest:
      min:
        description: Do not generate a programming language.
        value: None
      low:
        description: Generate one of the well known programming language short names.
        strategy: option::of(r"(cpp)|(js)|(py)|(r)|(ts)")
      high:
        description: Generate a random string of up to 10 alphanumeric characters.
        strategy: option::of(r"[a-zA-Z0-9]{1,10}")
      max:
        description: Generate an arbitrary string.
        strategy: option::of(String::arbitrary())
  authors:
    '@id': schema:author
    description: The authors of the code.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: span
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the code.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: span
