title: CreateAction
'@id': schema:CreateAction
nick: cta
extends: Action
category: flow
description: An action that creates a result.
$comment: |
  This is an implementation of schema.org
  [`CreateAction`](https://schema.org/CreateAction).

  In Stencila provenance it represents creation of new document content,
  generated outputs, or byte assets. It maps naturally to C2PA `c2pa.created`
  when projecting provenance to standard C2PA actions.
analogues:
  - id: schema:CreateAction
    notes: Direct schema.org source type.
  - name: C2PA c2pa.created action
    url: https://spec.c2pa.org/specifications/specifications/2.4/specs/C2PA_Specification.html#_actions
    notes: Approximate C2PA action projection when a manifest records newly created content.
