title: DateTimeValidator
'@id': stencila:DateTimeValidator
nick: dtv
extends: Entity
category: data
description: A validator specifying the constraints on a date-time.
$comment: |
  This is a type used in Stencila Schema for validating [`DateTime`](./date-time.md)
  nodes.

  It adapts common date-time constraint patterns to Stencila's node model so
  document parameters and structured data can require well-formed date-time
  values within specified bounds. This supports forms, configuration, and data
  validation workflows.

  Key properties define allowed ranges, formats, and related constraints.
markdown:
  derive: false
core:
  - minimum
  - maximum
properties:
  minimum:
    '@id': stencila:minimum
    $ref: DateTime
    description: The inclusive lower limit for a date-time.
    $comment: |
      A date-time is valid if it is greater than, or exactly equal to, `minimum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  maximum:
    '@id': stencila:maximum
    $ref: DateTime
    description: The inclusive upper limit for a date-time.
    $comment: |
      A date-time is valid if it is less than, or exactly equal to, `maximum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
