title: Periodical
'@id': schema:Periodical
nick: pdl
extends: CreativeWork
category: works
description: A periodical publication.
$comment: |
  This is an implementation of schema.org
  [`Periodical`](https://schema.org/Periodical).

  In Stencila Schema it is used to represent serial publications such as
  journals, magazines, and newspapers within the broader creative-work metadata
  model. It most often appears as the parent publication for
  [`PublicationVolume`](./publication-volume.md) and
  [`PublicationIssue`](./publication-issue.md) nodes.

  Key properties include `name`, `dateStart`, `dateEnd`, and `issns`.
core:
  - name
properties:
  dateStart:
    '@id': schema:startDate
    description: The date this Periodical was first published.
    $ref: Date
    serde:
      deserializeWith: option_string_or_object
  dateEnd:
    '@id': schema:endDate
    description: The date this Periodical ceased publication.
    $ref: Date
    serde:
      deserializeWith: option_string_or_object
  issns:
    '@id': schema:issn
    description: The International Standard Serial Number(s) (ISSN) that identifies this serial publication.
    $comment: |
      A periodical may have multiple ISSN (e.g. for online and print versions).
      See [issn.org](https://www.issn.org/understanding-the-issn/assignment-rules/the-issn-for-electronic-media/)
      for more details.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_array
