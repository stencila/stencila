title: Inline
"@id": stencila:Inline
category: prose
description: Union type for valid inline content.
$comment: |
  This is a union type used in Stencila Schema for inline content.

  It brings together the node types that can appear within prose content,
  analogous to inline-content unions in HTML, Markdown ASTs, and other document
  models. The union allows Stencila to mix text, marks, citations, code, math,
  media, and executable inline elements within a single typed model.

  Use this type to understand what can appear in inline `content` arrays such as
  those on [`Paragraph`](./paragraph.md), [`Heading`](./heading.md), and other
  prose nodes.
analogues:
  - name: HTML phrasing content
    url: https://html.spec.whatwg.org/multipage/dom.html#phrasing-content-2
    notes: Broadly analogous to HTML inline-capable content, though Stencila's union is a typed AST union rather than a DOM content category.
  - id: pandoc:Inline
    notes: Closest Pandoc union analogue for inline content.
  - name: MDAST phrasing content
    url: https://github.com/syntax-tree/mdast#phrasingcontent
    notes: Closest MDAST analogue for reusable inline-content positions.
default: Text
proptest: {}
