title: Agent
"@id": stencila:Agent
nick: agt
extends: CreativeWork
category: works
description: An AI agent definition.
$comment: |
  This is a type used in Stencila Schema for reusable AI agent definitions.

  It exists to represent an agent as a document-like artifact that combines
  metadata, model and provider preferences, tool and skill permissions, and an
  optional Markdown body of system instructions. Agents are discovered from
  workspace `.stencila/agents/` and user-level `~/.config/stencila/agents/`,
  allowing shared project agents and personal agent configurations to coexist.

  Key properties include `name`, `models`, `providers`, `allowedSkills`,
  `allowedTools`, and `content`.
analogues:
  - name: OpenAI GPT configuration
    url: https://platform.openai.com/
    notes: Approximate analogue for a reusable agent configuration combining instructions, model preferences, and tool policies.
  - name: Anthropic Claude system prompt configuration
    url: https://docs.anthropic.com/
    notes: Approximate provider-level analogue for reusable assistant behavior definitions.
markdown:
  derive: false
required:
  - name
  - description
core:
  - whenToUse
  - whenNotToUse
  - frontmatter
  - models
  - providers
  - modelSize
  - reasoningEffort
  - trustLevel
  - allowedSkills
  - allowedTools
  - content
properties:
  name:
    '@id': schema:name
    description: The name of the agent.
    $comment: |
      Must be lowercase kebab-case: 1-64 characters, only lowercase alphanumeric
      and hyphens, no leading/trailing/consecutive hyphens. By convention, names
      follow a `thing-role` pattern describing the agent's domain and function,
      e.g. `code-engineer`, `code-reviewer`, `data-analyst`, `site-designer`.
    type: string
    pattern: '^[a-z0-9]([a-z0-9-]{0,62}[a-z0-9])?$'
    patch:
      formats: [md, myst, qmd, smd]
  whenToUse:
    '@id': stencila:whenToUse
    description: Positive selection signals describing when this agent should be used.
    type: array
    items:
      type: string
    strip: [metadata]
    serde:
      deserializeWith: option_one_or_many
  whenNotToUse:
    '@id': stencila:whenNotToUse
    description: Negative selection signals describing when this agent should not be used.
    type: array
    items:
      type: string
    strip: [metadata]
    serde:
      deserializeWith: option_one_or_many
  frontmatter:
    "@id": stencila:frontmatter
    description: Frontmatter containing agent metadata.
    $comment: Currently assumed to be YAML.
    type: string
    strip: [metadata]
    patch:
      formats: [md, myst, qmd, smd]
  content:
    "@id": stencila:content
    description: The content of the agent (the Markdown body providing system instructions).
    $comment: |
      The Markdown body after the frontmatter contains the agent's system instructions.
      This is optional — an agent may be configuration-only with no instructions.
    type: array
    items:
      $ref: Block
    dom:
      elem: section
  models:
    "@id": stencila:models
    description: Model identifiers for the agent.
    $comment: |
      One or more models to use, e.g. "claude-sonnet-4-5", "gpt-5.2-codex". When not
      specified, the default model for the provider is used. Accepts a single string
      or an array of strings.
    type: array
    aliases:
      - model
    items:
      type: string
    serde:
      deserializeWith: option_one_or_many
  providers:
    "@id": stencila:providers
    description: Provider identifiers for the agent.
    $comment: |
      One or more providers to use, e.g. "anthropic", "openai", "gemini". When not
      specified, the first available provider is used. Accepts a single string or an
      array of strings.
    type: array
    aliases:
      - provider
    items:
      type: string
    serde:
      deserializeWith: option_one_or_many
  modelSize:
    "@id": stencila:modelSize
    description: Model size preference for the agent.
    $comment: |
      Preferred model size tier, e.g. "small", "medium", "large". Used for model
      selection when an exact model is not specified.
    type: string
    aliases:
      - model-size
      - model_size
  reasoningEffort:
    "@id": stencila:reasoningEffort
    description: Reasoning effort level for the agent.
    $comment: |
      Valid values are "low", "medium", "high", or a custom provider-specific value.
      When not specified, the provider's default is used.
    type: string
  historyThinkingReplay:
    "@id": stencila:historyThinkingReplay
    description: Whether to replay assistant thinking and reasoning in conversation history.
    $comment: |
      Controls whether chain-of-thought content (both provider-specific thinking parts
      and reasoning text) is included when replaying assistant turns in subsequent requests.
      - "none" (default): strip all thinking and reasoning from history, saving context space.
      - "full": replay thinking and reasoning content as-is.
    type: string
  truncationPreset:
    "@id": stencila:truncationPreset
    description: Named preset for tool output truncation limits.
    $comment: |
      Controls how aggressively tool outputs are truncated before being included
      in the conversation context.
      - "strict": tighter limits, preserves more context budget for conversation.
      - "balanced" (default): moderate limits suitable for most agents.
      - "verbose": no additional truncation beyond spec defaults.
    type: string
  compactionTriggerPercent:
    "@id": stencila:compactionTriggerPercent
    description: Context usage percentage that triggers proactive history compaction.
    $comment: |
      When estimated context usage exceeds this percentage of the model's context
      window, the agent proactively compacts conversation history (stripping
      thinking blocks, summarizing old tool results, dropping oldest turns).
      Set to 0 to disable proactive compaction. Defaults to 70.
    $ref: UnsignedInteger
  trustLevel:
    "@id": stencila:trustLevel
    description: Trust level controlling how strictly the agent's operations are guarded.
    $comment: |
      Controls tool guard behavior across shell, file, and web tools.
      - "low": default-deny for shell; strictest rules for file and web.
      - "medium" (default): default-allow with destructive behavior blocking.
      - "high": default-allow with relaxed blocking.
      When not specified, defaults to "medium" at guard construction time.
    type: string
  allowedSkills:
    "@id": stencila:allowedSkills
    description: Skill names this agent can use.
    $comment: |
      When unset, all discovered skills are available to the agent.
      When set to a non-empty array, only the listed skills are available.
      When set to an empty array, skills are disabled entirely (no discovery or registration).
    type: array
    items:
      type: string
  allowedTools:
    "@id": stencila:allowedTools
    description: Tool names available to the agent.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_ssv_or_array
  allowedDomains:
    "@id": stencila:allowedDomains
    description: Domain allowlist for web_fetch.
    $comment: |
      Supports exact hosts and `*.` wildcard subdomain entries.
      If set, domains not in this list are denied.
      If both allowedDomains and disallowedDomains are set, allowlist wins.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_ssv_or_array
  disallowedDomains:
    "@id": stencila:disallowedDomains
    description: Domain denylist for web_fetch.
    $comment: |
      Supports exact hosts and `*.` wildcard subdomain entries.
      If set without allowedDomains, matching domains are denied.
      If both allowedDomains and disallowedDomains are set, allowlist wins.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_ssv_or_array
  enableMcp:
    "@id": stencila:enableMcp
    description: Whether to enable MCP tools.
    type: boolean
  enableMcpCodemode:
    "@id": stencila:enableMcpCodemode
    description: Whether to enable MCP codemode orchestration.
    type: boolean
  allowedMcpServers:
    "@id": stencila:allowedMcpServers
    description: MCP server IDs this agent is allowed to use.
    $comment: |
      When unset, all discovered and connected MCP servers are available.
      When set, only the listed server IDs are used — other servers are
      ignored even if connected. This supports the principle of least
      privilege: agents should only have access to the MCP servers they
      actually need.
    type: array
    items:
      type: string
    serde:
      deserializeWith: option_csv_or_ssv_or_array
  maxTurns:
    "@id": stencila:maxTurns
    description: Maximum conversation turns (0 = unlimited).
    type: integer
  toolTimeout:
    "@id": stencila:toolTimeout
    description: Default timeout for tool execution in seconds.
    type: integer
  maxToolRounds:
    "@id": stencila:maxToolRounds
    description: Maximum tool-call rounds per user input.
    type: integer
  maxSubagentDepth:
    "@id": stencila:maxSubagentDepth
    description: Maximum subagent nesting depth.
    type: integer
  compatibility:
    "@id": stencila:compatibility
    description: Environment requirements for the agent.
    $comment: |
      Max 500 characters. Indicates intended product, required system packages,
      network access needs, etc. Most agents do not need this field.
    type: string
