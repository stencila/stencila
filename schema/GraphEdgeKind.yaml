title: GraphEdgeKind
'@id': stencila:GraphEdgeKind
extends: Enumeration
category: flow
description: The kind of directed relationship represented by a graph edge.
$comment: |
  This enumeration is used by `GraphEdge` for describing the relation between
  nodes in a `Graph`. Edge direction is always from upstream dependency,
  source, or component to downstream dependant, result, or containing node.

  Variant names should be read in graph direction as "upstream <kind>
  downstream". Some names use passive phrasing (`UsedBy`, `ReadBy`) and others
  use established relation phrases (`PartOf`, `Generated`, `Declares`), but
  their direction is always defined by `GraphEdge.source` to `GraphEdge.target`.

  Variant descriptions document related W3C PROV-O predicates where applicable.
  These mappings are guidance only: Stencila graph edges keep a consistent
  dependency direction, while several PROV-O predicates use the opposite RDF
  subject/object direction or apply only approximately. The PROV-O namespace is
  `http://www.w3.org/ns/prov#`.
anyOf:
  - const: UsedBy
    '@id': stencila:UsedBy
    description: The upstream node is used by the downstream node. Related to `prov:used` with inverse direction.
  - const: ReadBy
    '@id': stencila:ReadBy
    description: The upstream node is read by the downstream node. Related to `prov:used` with inverse direction.
  - const: Generated
    '@id': stencila:Generated
    description: The upstream node generated the downstream node. Related to `prov:generated` and to `prov:wasGeneratedBy` with inverse direction.
  - const: WrittenTo
    '@id': stencila:WrittenTo
    description: The upstream data or value is written to the downstream resource. Related to `prov:generated` for the downstream resource and to `prov:used` for the upstream value.
  - const: DerivedInto
    '@id': stencila:DerivedInto
    description: The upstream node is derived into the downstream node. Related to `prov:wasDerivedFrom` with inverse direction.
  - const: ConvertedInto
    '@id': stencila:ConvertedInto
    description: The upstream node is converted into the downstream node, usually changing representation or media format. Related to `prov:wasDerivedFrom` with inverse direction.
  - const: CalledBy
    '@id': stencila:CalledBy
    description: The upstream node is called by the downstream node. Approximately related to `prov:used` with inverse direction, or `prov:wasInformedBy` for activity dependencies.
  - const: ImportedBy
    '@id': stencila:ImportedBy
    description: The upstream node is imported by the downstream node. Approximately related to `prov:hadPrimarySource` or `prov:wasDerivedFrom` with inverse direction.
  - const: PartOf
    '@id': stencila:PartOf
    description: The upstream node is part of the downstream node. Related to `schema:isPartOf` and inverse `schema:hasPart`.
  - const: IncludedBy
    '@id': stencila:IncludedBy
    description: The upstream source is included by the downstream document node or document region.
  - const: LinkedBy
    '@id': stencila:LinkedBy
    description: The upstream resource is linked to by the downstream link, media object, document, or document region.
  - const: CitedBy
    '@id': stencila:CitedBy
    description: The upstream node is cited by the downstream node. Stencila document relation with no exact core PROV-O equivalent; quotation-specific cases may relate to `prov:wasQuotedFrom` with inverse direction.
  - const: Declares
    '@id': stencila:Declares
    description: The upstream manifest, configuration, or source file declares the downstream environment, dependency, workflow, or other computational resource.
  - const: Configures
    '@id': stencila:Configures
    description: The upstream configuration file or setting configures the downstream workflow, environment, code unit, or tool.
  - const: RequiredBy
    '@id': stencila:RequiredBy
    description: The upstream package or software component is required by the downstream environment or source code.
  - const: Pins
    '@id': stencila:Pins
    description: The upstream lockfile, digest, or exact version pin constrains the downstream environment or dependency.
