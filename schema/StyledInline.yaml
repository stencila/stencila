title: StyledInline
'@id': stencila:StyledInline
nick: sti
extends: Styled
category: style
description: Styled inline content.
$comment: |
  This is an inline type used in Stencila Schema for content with explicit styling.

  It extends [`Styled`](./styled.md) so inline styling can be represented
  structurally and transported across formats while remaining distinct from
  semantic marks such as emphasis or quotation.

  Key properties include inline `content` together with inherited styling
  information from [`Styled`](./styled.md).
status: beta
dom:
  derive: false
html:
  elem: span
jats:
  elem: styled-content
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - content
properties:
  content:
    '@id': stencila:content
    description: The content within the span.
    type: array
    items:
      $ref: Inline
    dom:
      elem: span
    proptest:
      min:
        description: Generate a single fixed text value.
        value: vec![t("text")]
      high:
        description: Generate up to two arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(4)
