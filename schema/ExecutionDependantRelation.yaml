title: ExecutionDependantRelation
'@id': stencila:ExecutionDependantRelation
extends: Enumeration
category: flow
description: A downstream execution relation between nodes.
$comment: |
  This is an enumeration used in Stencila Schema describing how one node is a
  downstream dependant of another.

  It exists to classify dependency-graph edges with semantics that are
  meaningful for execution planning and invalidation, rather than treating all
  downstream links as equivalent.

  See
  [`ExecutionDependant.dependantRelation`](./execution-dependant.md#dependantrelation)
  for the property that uses this enumeration.
default: Assigns
anyOf:
  - const: Assigns
    '@id': stencila:Assigns
    description: The node assigns its dependant (usually a variable)
  - const: Alters
    '@id': stencila:Alters
    description: The node alters its dependant (usually a variable)
  - const: Declares
    '@id': stencila:Declares
    description: The node declares its dependant (e.g. a database table)
  - const: Writes
    '@id': stencila:Writes
    description: The node writes its dependant (usually a file)
