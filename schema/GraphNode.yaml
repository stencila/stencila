title: GraphNode
'@id': stencila:GraphNode
nick: gnd
extends: Entity
category: flow
description: A node in a graph.
$comment: |
  This is a graph node type used in Stencila Schema for representing provenance,
  reactivity and other graphs.

  The wrapper gives every graph node a required graph-local `id` for edge
  endpoints and a required `nodeType` so graph consumers can interpret the
  represented Stencila node even when `node` is external, omitted, or redacted.

  The optional `node` property embeds the represented Stencila node when the
  graph needs to carry more than typed endpoint metadata.
required:
  - id
  - nodeType
core:
  - nodeType
  - node
properties:
  id:
    '@id': schema:id
    description: The durable graph-local id used by graph edges to reference this graph node.
    type: string
  nodeType:
    '@id': stencila:nodeType
    description: The Stencila node type represented by this graph node, matching `node.type` when `node` is present.
    type: string
  node:
    '@id': stencila:node
    description: The embedded Stencila node represented by this graph node.
    $ref: Node
