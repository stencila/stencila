title: GraphNode
'@id': stencila:GraphNode
nick: gnd
extends: Entity
category: flow
description: A node in a graph.
$comment: |
  This is a graph node type used in Stencila Schema for representing provenance,
  reactivity and other graphs.

  The wrapper gives every graph node a required graph-local `id` for edge
  endpoints and embeds the represented Stencila resource or document node.
required:
  - id
  - node
core:
  - node
properties:
  id:
    '@id': schema:id
    description: The durable graph-local id used by graph edges to reference this graph node.
    type: string
  node:
    '@id': stencila:node
    description: The embedded Stencila node represented by this graph node.
    $ref: Node
