title: CallBlock
'@id': stencila:CallBlock
nick: clb
extends: IncludeBlock
category: flow
description: Call another document, optionally with arguments, and include its executed content.
$comment: |
  This is an executable type used in Stencila Schema for calling another document and
  including its results.

  It extends [`IncludeBlock`](./include-block.md) with parameterized execution
  semantics so one document can invoke another as a reusable component. This
  supports composition, templating, and workflow-style reuse across documents.

  Key properties include inherited include-target information together with call
  arguments and execution-related properties.
status: experimental
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - arguments
properties:
  arguments:
    '@id': stencila:arguments
    description: The value of the source document's parameters to call it with
    type: array
    items:
      $ref: CallArgument
    strip: [code]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      elem: div
    proptest:
      min:
        description: An empty set of arguments.
        value: Vec::new()
      low:
        description: Generate up to 3 arbitrary arguments
        strategy: vec(CallArgument::arbitrary(), size_range(0..=3))
      high:
        description: Generate up to 10 arbitrary arguments
        strategy: vec(CallArgument::arbitrary(), size_range(0..=10))
