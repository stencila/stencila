title: Instruction
"@id": stencila:Instruction
extends: Executable
abstract: true
category: edits
description: An abstract base type for document editing instructions.
$comment: |
  This is an abstract base type used in Stencila Schema for model-assisted document
  editing instructions.

  It extends [`Executable`](./executable.md) so instructions can carry prompt
  rendering, user messages, model parameters, execution state, and generated
  suggestions as part of the document model itself. This makes editing workflows
  inspectable, replayable, and serializable.

  Key properties include `instructionType`, `prompt`, `message`,
  `modelParameters`, and `activeSuggestion`.
analogues:
  - name: chat-based edit instruction
    url: https://platform.openai.com/docs/guides/text-generation
    notes: Approximate analogue for model-directed editing requests, though Stencila persists prompts, messages, execution state, and suggestions as structured document nodes.
required:
  - instructionType
  - prompt
  - message
  - modelParameters
core:
  - activeSuggestion
properties:
  instructionType:
    "@id": stencila:instructionType
    description: The type of instruction describing the operation to be performed.
    $ref: InstructionType
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  prompt:
    "@id": stencila:prompt
    description: The prompt selected, rendered and provided to the model
    $ref: PromptBlock
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    serde:
      default: true
    dom:
      elem: div
  message:
    "@id": stencila:message
    description: The instruction message, possibly including images, audio, or other media.
    $ref: InstructionMessage
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    serde:
      default: true
    dom:
      elem: div
  modelParameters:
    "@id": stencila:modelParameters
    description: Model selection and inference parameters.
    $ref: ModelParameters
    aliases:
      - model-parameters
      - model_parameters
      - model-params
      - model_params
      - model-pars
      - model_pars
      - model
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    serde:
      default: true
    dom:
      elem: div
  activeSuggestion:
    "@id": stencila:activeSuggestion
    description: The index of the suggestion that is currently active
    $ref: UnsignedInteger
