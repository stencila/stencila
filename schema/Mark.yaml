title: Mark
'@id': stencila:Mark
extends: Entity
category: prose
abstract: true
description: An abstract base type for marked inline content.
$comment: |
  This is an abstract base type used in Stencila Schema for inline marked content.

  It exists to group inline nodes that wrap other inline content with semantic
  markup such as emphasis, quotes, annotations, or editorial marks. This allows
  shared handling of nested inline content and common metadata while keeping
  specific mark semantics in derived types.

  Key properties usually include wrapped `content`, together with inherited
  metadata and provenance features from [`Entity`](./entity.md).
required:
  - content
properties:
  content:
    '@id': 'stencila:content'
    description: The content that is marked.
    type: array
    items:
      $ref: Inline
    dom:
      elem: none
    proptest:
      min:
        description: Generate a single fixed text value.
        value: vec![t("text")]
      low:
        description: Generate a single arbitrary, non-recursive, inline node
        strategy: vec_inlines_non_recursive(1)
      high:
        description: Generate up to two arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(4)
