title: SuggestionInline
'@id': stencila:SuggestionInline
nick: sgi
extends: Suggestion
category: edits
description: Abstract base type for nodes that indicate a suggested change to inline content.
$comment: |
  This is an abstract base type used in Stencila Schema for suggestions that operate on
  inline content.

  It extends [`Suggestion`](./suggestion.md) so fine-grained proposed edits
  within prose can be represented separately from block-level changes while
  reusing the common suggestion model.

  Key properties are primarily inherited from [`Suggestion`](./suggestion.md),
  with semantics centered on inline-content replacements and originals.
analogues:
  - name: inline tracked change
    url: https://learn.microsoft.com/en-us/office/open-xml/word/working-with-comments-and-tracked-revisions
    notes: Approximate analogue for suggested insertions, deletions, and replacements within prose spans.
markdown:
  derive: false
required:
  - content
core:
  - original
properties:
  content:
    '@id': stencila:content
    description: The suggested content. For insertions and replacements, this is the new content; for deletions, this is the content being deleted.
    type: array
    items:
      $ref: Inline
    dom:
      elem: span
    proptest:
      min:
        description: Generate a single fixed text value.
        value: vec![t("text")]
      low:
        description: Generate a single arbitrary, non-recursive, inline node
        strategy: vec_inlines_non_recursive(1)
      high:
        description: Generate up to two arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, inline nodes
        strategy: vec_inlines_non_recursive(4)
  original:
    '@id': stencila:original
    description: The original content. For replacements, this is the content being replaced; for deletions, this should be absent.
    type: array
    items:
      $ref: Inline
    dom:
      elem: span
