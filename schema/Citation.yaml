title: Citation
"@id": stencila:Citation
extends: Entity
category: prose
description: A reference to a `CreativeWork` that is cited in another `CreativeWork`.
$comment: |
  This is a type used in Stencila Schema for in-text citations of creative works.

  It exists to represent a citation as a structured inline node that can be
  resolved, rendered according to a document's citation style, and enriched with
  rhetorical intent and pagination metadata. Unlike a plain text reference, it
  can preserve both the citation target and its rendered form.

  Key properties include `target`, `cites`, `citationMode`,
  `citationIntent`, `content`, and any page or suffix metadata.
analogues:
  - id: jats:xref
    notes: Closest JATS cross-reference analogue for in-text citations, though Stencila citations carry richer citation-specific metadata and resolved reference data.
  - id: pandoc:Cite
    notes: Closest Pandoc analogue for inline citations, with similar support for grouped items and prefixes or suffixes.
  - id: myst:role:cite
    notes: Close MyST analogue for citation syntax in authoring, though Stencila stores the citation as a resolved inline node with additional metadata.
jats:
  special: true
latex:
  derive: false
markdown:
  derive: false
required:
  - target
core:
  - citationMode
properties:
  target:
    "@id": schema:target
    description: The target of the citation (URL or reference ID).
    type: string
    patch:
      formats: [all]
  compilationMessages:
    "@id": stencila:compilationMessages
    description: Messages generated while resolving the target if the citation.
    strip: [compilation]
    type: array
    items:
      $ref: CompilationMessage
  cites:
    "@id": stencila:cites
    description: The `Reference` being cited, resolved from the `target`.
    $ref: Reference
  citationMode:
    "@id": stencila:citationMode
    description: Determines how the citation is shown within the surrounding text.
    $ref: CitationMode
    patch:
      formats: [all]
  citationIntent:
    "@id": stencila:citationIntent
    description: The type/s of the citation, both factually and rhetorically.
    type: array
    items:
      $ref: CitationIntent
  content:
    "@id": stencila:content
    description: A rendering of the citation using the citation style of the document.
    type: array
    items:
      $ref: Inline
    walk: false
    dom:
      elem: span
  pageStart:
    "@id": schema:pageStart
    description: The page on which the work starts; for example "135" or "xiii".
    anyOf:
      - type: integer
      - type: string
  pageEnd:
    "@id": schema:pageEnd
    description: The page on which the work ends; for example "138" or "xvi".
    anyOf:
      - type: integer
      - type: string
  pagination:
    "@id": schema:pagination
    description: |
      Any description of pages that is not separated into pageStart and pageEnd;
      for example, "1-6, 9, 55".
    type: string
  citationPrefix:
    "@id": stencila:citationPrefix
    description: Text to show before the citation.
    type: string
    $comment: |
      Previously this was name `prefix` but for consistency with `citationMode`
      and `honorificPrefix`, to avoid ambiguity with other prefixes was renamed
      to `citationPrefix`.
  citationSuffix:
    "@id": stencila:citationSuffix
    description: Text to show after the citation.
    type: string
    $comment: |
      See comment on `citationPrefix` regarding naming.
