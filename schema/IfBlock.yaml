title: IfBlock
'@id': stencila:IfBlock
extends: Executable
category: flow
description: A block that conditionally shows and executes alternative content.
$comment: |
  This is an executable control-flow block used in Stencila Schema for conditional
  content.

  It extends [`Executable`](./executable.md) so alternative blocks of document
  content can be selected and executed based on evaluated conditions. This
  allows dynamic document structure while preserving a typed, inspectable node
  model.

  Key properties include the ordered clauses and inherited execution state used
  to determine and record the selected branch.
status: beta
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - clauses
properties:
  clauses:
    '@id': 'stencila:clauses'
    description: The clauses making up the `IfBlock` node
    type: array
    items:
      $ref: IfBlockClause
    strip: [code]
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex]
    dom:
      elem: div
    html:
      slot: div
    proptest:
      min:
        description: A single fixed clause with a single paragraph.
        value: vec![ibc("true", None::<String>, [p([t("If clause")])])]
      low:
        description: Generate up to 3 arbitrary if clauses
        strategy: vec(IfBlockClause::arbitrary(), size_range(1..=3))
      high:
        description: Generate up to 5 arbitrary if clauses
        strategy: vec(IfBlockClause::arbitrary(), size_range(1..=10))
