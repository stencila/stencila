title: Suggestion
'@id': stencila:Suggestion
extends: Entity
category: edits
abstract: true
description: Abstract base type for nodes that indicate a suggested change to content.
$comment: |
  This is an abstract base type used in Stencila Schema for suggested document changes.

  It exists to represent proposed edits as first-class nodes that can carry
  status, feedback, provenance, and original or replacement content. This
  supports review and model-assisted editing workflows that need suggestions to
  persist within the document model.

  Key properties include the suggestion `suggestionType`, `status`, and any
  associated feedback or authorship metadata.
analogues:
  - name: word processor tracked change
    url: https://learn.microsoft.com/en-us/office/open-xml/word/working-with-comments-and-tracked-revisions
    notes: Close editing analogue for persisted proposed changes, though Stencila suggestions are explicit typed nodes rather than markup overlays in a word-processing format.
core:
  - suggestionType
  - suggestionStatus
  - authors
  - provenance
  - datePublished
  - executionDuration
  - executionEnded
  - feedback
properties:
  suggestionType:
    '@id': stencila:suggestionType
    description: The type of suggestion including whether it is an insertion or a deletion.
    strip: [metadata]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    $ref: SuggestionType
  suggestionStatus:
    '@id': stencila:suggestionStatus
    description: The status of the suggestion including whether it is the original, or is accepted, or rejected.
    strip: [metadata]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    $ref: SuggestionStatus
  authors:
    "@id": schema:author
    description: The authors of the suggestion
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: span
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the content within the suggestion.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: span
  datePublished:
    "@id": schema:datePublished
    aliases:
      - date
    description: Date of the suggestion was created.
    $comment: |
      Provides consistency with `Comment` (and other `CreativeWork` node types)
      as the property for storing the date of creation of the suggestion.
    $ref: DateTime
    strip: [metadata]
    serde:
      deserializeWith: option_string_or_object
    dom:
      with: DateTime::to_dom_attr
  executionDuration:
    '@id': stencila:executionDuration
    description: Time taken to generate the suggestion.
    strip: [execution]
    $ref: Duration
    dom:
      with: Duration::to_dom_attr
  executionEnded:
    '@id': stencila:executionEnded
    description: The timestamp when the generation ended.
    strip: [execution, timestamps]
    $ref: Timestamp
    dom:
      with: Timestamp::to_dom_attr
  feedback:
    '@id': stencila:feedback
    description: Feedback on the suggestion
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd]
