title: Grant
'@id': schema:Grant
extends: Thing
category: other
description: A grant, typically financial or otherwise quantifiable, of resources.
$comment: |
  This is an implementation of schema.org [`Grant`](https://schema.org/Grant).

  In Stencila Schema it is used for structured funding metadata attached to
  creative works and related entities. It remains close to the schema.org model
  while integrating with Stencila's richer document metadata and contributor
  tracking.

  Key properties are typically used via funding-related fields on
  [`CreativeWork`](./creative-work.md) and derived types.
analogues:
  - id: schema:Grant
properties:
  fundedItems:
    '@id': schema:fundedItem
    description: Indicates an item funded or sponsored through a Grant.
    $comment: |
      An array because a grant may have more than one funded item.
    type: array
    items:
      $ref: ThingVariant
  sponsors:
    '@id': schema:sponsor
    description: A person or organization that supports a thing through a pledge, promise, or financial contribution.
    $comment: |
      An array because a grant may have more than one sponsor.
    type: array
    items:
      anyOf:
        - $ref: Person
        - $ref: Organization
    serde:
      deserializeWith: option_one_or_many_string_or_object
