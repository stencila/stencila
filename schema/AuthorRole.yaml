title: AuthorRole
'@id': stencila:AuthorRole
extends: Role
category: works
description: An author and their role.
$comment: |
  This is a Stencila Schema specialization of schema.org
  [`Role`](https://schema.org/Role) for authorship.

  It exists to represent not just who contributed to a work, but how they
  contributed and in what format or editing context. This supports richer
  provenance, attribution, and contribution tracking than a flat list of authors
  alone.

  Key properties include `author`, `roleName`, `format`, and `lastModified`.
analogues:
  - id: schema:Role
    notes: Direct schema.org source pattern, specialized by Stencila for authorship and contribution provenance.
  - name: CRediT contributor role assertion
    url: https://credit.niso.org/
    notes: Approximate analogue for attributed contributor roles, though Stencila additionally records author identity, format, and modification metadata in one node.
dom:
  derive: false
required:
  - author
  - roleName
core:
  - format
  - lastModified
properties:
  author:
    '@id': schema:author
    description: The entity acting as an author.
    $ref: AuthorRoleAuthor
  roleName:
    '@id': schema:roleName
    description: The role played by the author.
    $ref: AuthorRoleName
  format:
    '@id': stencila:format
    description: The format that the author used to perform the role. e.g. Markdown, Python
    type: string
  lastModified:
    '@id': stencila:lastModified
    description: Timestamp of most recent modification, by the author, in the role.
    $ref: Timestamp
    strip: [timestamps]
