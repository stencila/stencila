title: Admonition
'@id': stencila:Admonition
extends: Entity
category: prose
description: An admonition within a document.
$comment: |
  This is a type used in Stencila Schema for admonition or callout blocks.

  It exists to represent semantically distinct callouts such as notes,
  warnings, tips, and cautions as structured document content rather than as
  presentation-only containers. This supports consistent rendering, folding, and
  transformation across authoring and publishing formats.

  Key properties include `admonitionType`, `title`, `isFolded`, and `content`.
analogues:
  - id: html:aside
    notes: Closest HTML sectioning analogue, though HTML `<aside>` is broader and does not itself encode admonition type or folding behavior.
  - id: jats:boxed-text
    notes: Closest JATS analogue for boxed callout content, but JATS does not standardize the same admonition type vocabulary.
  - id: pandoc:Div
    notes: Pandoc admonitions are usually represented as divisions with classes and attributes rather than a dedicated node type.
  - id: myst:directive:admonition
dom:
  derive: false
html:
  elem: aside
jats:
  elem: boxed-text
markdown:
  derive: false
proptest: {}
required:
  - admonitionType
  - content
core:
  - title
  - isFolded
  - authors
  - provenance
properties:
  admonitionType:
    '@id': stencila:admonitionType
    description: The type of admonition.
    $ref: AdmonitionType
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      attr: content-type
    proptest:
      min:
        description: Fixed admonition type.
        value: AdmonitionType::Info
      low:
        description: Generate an arbitrary admonition type.
        strategy: AdmonitionType::arbitrary()
  title:
    '@id': schema:headline
    description: The title of the admonition.
    type: array
    items:
      $ref: Inline
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      elem: p
    jats:
      elem: caption
    proptest:
      min:
        description: No title.
        value: None
      low:
        description: Generate up to two arbitrary, non-recursive, inline nodes.
        strategy: option::of(vec_inlines_non_recursive(2))
      high:
        description: Generate up to four arbitrary, non-recursive, inline nodes.
        strategy: option::of(vec_inlines_non_recursive(4))
  isFolded:
    '@id': stencila:isFolded
    description: Whether the admonition is folded.
    $comment: |
      When an admonition is folded, its `content` is hidden by default, but
      can be toggled to be visible or hidden.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    jats:
      attr: is-folded
    proptest:
      min:
        description: Not foldable.
        value: None
      low:
        description: Arbitrarily, un-foldable, folded, or unfolded.
        strategy: option::of(bool::arbitrary())
  content:
    '@id': stencila:content
    description: The content within the section.
    type: array
    items:
      $ref: Block
    dom:
      elem: aside
    proptest:
      min:
        description: A single, simple paragraph.
        value: vec![p([t("Admonition content")])]
      low:
        description: Generate up to two arbitrary paragraphs.
        strategy: vec_paragraphs(2)
      high:
        description: Generate up to four arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(4)
  authors:
    '@id': schema:author
    description: The authors of the admonition.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: div
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the content within the admonition.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: div
