title: ExecutionDependency
'@id': stencila:ExecutionDependency
nick: exy
extends: Entity
category: flow
description: An upstream execution dependency of a node.
$comment: |
  This is a type used in Stencila Schema for describing an upstream execution
  dependency of a node.

  It exists to make the inputs and prerequisites of executable nodes explicit in
  the schema, enabling incremental execution, invalidation, and inspection of
  execution graphs.

  Key properties identify the dependency node and the relation that explains why
  it is required.
required:
  - dependencyRelation
  - dependencyType
  - dependencyId
core:
  - codeLocation
properties:
  dependencyRelation:
    '@id': stencila:dependencyRelation
    description: The relation to the dependency.
    $ref: ExecutionDependencyRelation
  dependencyType:
    '@id': stencila:dependencyType
    description: The type of node that is the dependency.
    type: string
  dependencyId:
    '@id': stencila:dependencyId
    description: The id of node that is the dependency.
    type: string
  codeLocation:
    '@id': stencila:codeLocation
    description: The location that the dependency is defined.
    $ref: CodeLocation

