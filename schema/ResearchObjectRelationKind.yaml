title: ResearchObjectRelationKind
'@id': stencila:ResearchObjectRelationKind
extends: Enumeration
category: works
description: The kind of relation from one research object to another.
$comment: |
  This enumeration defines the constrained vocabulary for authored relations
  between Stencila research objects. It is based on
  [MIRA](https://github.com/MIRA-science/schema), a discourse graph vocabulary
  for modular research objects with JSON-LD context published at
  `https://purl.org/mira-science/mira.jsonld`.

  Variant `@id`s mirror the published MIRA term identifiers verbatim, which is
  why some are camelCase (`mira:supportedBy`) and others snake_case
  (`mira:is_grounded_in`).

  Most relations come in directional pairs declared as `owl:inverseOf` each
  other in MIRA (e.g. `Supports`/`SupportedBy`). Both directions are
  authorable so that a relation can be declared on whichever research object
  is most convenient to edit; the direction is always semantically
  significant. `Follows` has no inverse in MIRA. `RequestFor` and
  `RequestTarget` are not inverses of each other: both have a request as
  their source and a request may declare both.

  Use this narrower vocabulary on `ResearchObjectRelation`. Values map
  one-to-one by name to the corresponding discourse-oriented variants in
  `GraphEdgeKind` when document graphs are built. Variant descriptions are
  duplicated in `GraphEdgeKind` and must be kept in sync.
anyOf:
  - const: Supports
    '@id': mira:supports
    description: The source research object, typically evidence or a claim, supports the target claim.
  - const: SupportedBy
    '@id': mira:supportedBy
    description: The source claim is supported by the target research object, typically evidence or another claim. Inverse of `Supports`.
  - const: Opposes
    '@id': mira:opposes
    description: The source research object, typically evidence or a claim, opposes the target claim.
  - const: OpposedBy
    '@id': mira:opposedBy
    description: The source claim is opposed by the target research object, typically evidence or another claim. Inverse of `Opposes`.
  - const: Addresses
    '@id': mira:addresses
    description: The source claim addresses the target research question.
  - const: AddressedBy
    '@id': mira:addressedBy
    description: The source research question is addressed by the target claim. Inverse of `Addresses`.
  - const: Follows
    '@id': mira:follows
    description: The source research object, typically a study or other research activity, was conducted following the target protocol.
  - const: Grounds
    '@id': mira:grounds
    description: The source research object, typically a study or other research activity, produced and grounds the target evidence.
  - const: IsGroundedIn
    '@id': mira:is_grounded_in
    description: The source evidence is grounded in the target study or other research activity that produced it. Inverse of `Grounds`.
  - const: RequestFor
    '@id': mira:request_for
    description: The source request asks for the target work, such as a study or protocol execution, to be carried out. Not the inverse of `RequestTarget`.
  - const: RequestTarget
    '@id': mira:request_target
    description: The source request concerns the target claim that the requested work may elucidate. Not the inverse of `RequestFor`.
