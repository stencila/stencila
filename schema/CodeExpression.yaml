title: CodeExpression
'@id': stencila:CodeExpression
nick: cde
extends: CodeExecutable
category: code
description: An executable code expression.
$comment:
  This is an executable code node used in Stencila Schema for expressions.

  It extends [`CodeExecutable`](./code-executable.md) for code that evaluates to
  a value inline rather than producing a block of outputs. This makes it useful
  for computed inline content and expression-oriented document workflows.

  Key properties include the expression `code`, `programmingLanguage`, `output`,
  and inherited execution metadata.
analogues:
  - name: Jupyter expression output cell fragment
    url: https://nbformat.readthedocs.io/
    notes: Approximate analogue for expression-oriented execution that yields a value, though notebooks do not expose a dedicated expression node.
  - id: myst:role:eval
    notes: Close MyST authoring analogue for inline evaluation or expression rendering.
jats:
  elem: code
  attrs:
    executable: 'yes'
latex:
  derive: false
markdown:
  derive: false
text:
  derive: false
proptest: {}
core:
  - output
properties:
  programmingLanguage:
    $comment: |
      This is an override of the property spec from `CodeExecutable` which is necessary
      because `patch.formats` should not include 'myst' (because MyST does not support options on "roles").
    '@id': schema:programmingLanguage
    description: The programming language of the code.
    type: string
    strip: [code]
    patch:
      formats: [smd]
    jats:
      attr: language
  executionMode:
    '@id': stencila:executionMode
    description: Under which circumstances the code should be executed.
    $comment: |
      This is an override of the property spec from `Executable` which is necessary
      because `patch.formats` should not include 'myst' (because MyST does not support options on "roles").
    $ref: ExecutionMode
    strip: [code]
    patch:
      formats: [smd]
  output:
    '@id': stencila:output
    description: The value of the expression when it was last evaluated.
    $ref: Node
    strip: [output]
    dom:
      elem: span
    html:
      slot: span
    jats:
      content: true
