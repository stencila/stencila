title: Sentence
"@id": stencila:Sentence
nick: sen
extends: Entity
category: prose
description: A sentence, usually within a `Paragraph`.
$comment: |
  This is a type used in Stencila Schema for explicit sentence-level content.

  It exists so documents can represent sentence boundaries structurally when
  that granularity matters for provenance, annotation, review, or
  natural-language tooling. This is more precise than inferring sentences from
  plain text after the fact.

  Key properties include the sentence `content` and any associated authorship or
  provenance metadata.
analogues:
  - name: Universal Dependencies sentence span
    url: https://universaldependencies.org/
    notes: Close linguistic analogue for explicit sentence segmentation, though UD usually treats sentences as annotation spans rather than document-tree nodes.
  - id: pandoc:Span
    notes: Only an approximate Pandoc analogue; Pandoc has no dedicated sentence node and sentence boundaries are usually inferred.
required:
  - content
properties:
  content:
    "@id": stencila:content
    description: The content of the sentence.
    type: array
    items:
      $ref: Inline
    dom:
      elem: none
