title: Form
'@id': stencila:Form
nick: frm
description: A form for batched updates to document parameters.
$comment: |
  This is an executable type used in Stencila Schema for forms that batch updates to
  document parameters.

  It extends [`Executable`](./executable.md) so forms can derive values, trigger
  updates, and participate in reactive document workflows rather than being
  treated as passive UI markup. This makes forms part of the executable document
  model.

  Key properties include form content, derive actions, parameter bindings, and
  inherited execution metadata.
status: experimental
extends: Executable
category: flow
required:
  - content
properties:
  content:
    '@id': 'stencila:content'
    description: The content within the form, usually containing at least one `Parameter`.
    type: array
    items:
      $ref: Block
    dom:
      elem: div
  deriveFrom:
    '@id': stencila:deriveFrom
    description: The dotted path to the object (e.g a database table) that the form should be derived from
    type: string
  deriveAction:
    '@id': stencila:deriveAction
    description: The action (create, update or delete) to derive for the form
    $ref: FormDeriveAction
  deriveItem:
    '@id': stencila:deriveItem
    description: An identifier for the item to be the target of Update or Delete actions
    anyOf:
      - type: integer
      - type: string
