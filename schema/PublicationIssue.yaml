title: PublicationIssue
'@id': schema:PublicationIssue
nick: pbi
extends: CreativeWork
category: works
description: A publication issue.
$comment: |
  This is an implementation of schema.org
  [`PublicationIssue`](https://schema.org/PublicationIssue).

  It is used for periodical and scholarly publication metadata while fitting
  into Stencila's broader creative-work model.

  Key properties include `issueNumber`, `isPartOf`, `pageStart`, `pageEnd`, and
  `pagination`.
core:
  - isPartOf
  - issueNumber
properties:
  issueNumber:
    '@id': schema:issueNumber
    description: Identifies the issue of publication; for example, "iii" or "2".
    anyOf:
      - type: integer
      - type: string
  pageStart:
    '@id': schema:pageStart
    description: The page on which the issue starts; for example "135" or "xiii".
    anyOf:
      - type: integer
      - type: string
  pageEnd:
    '@id': schema:pageEnd
    description: The page on which the issue ends; for example "138" or "xvi".
    anyOf:
      - type: integer
      - type: string
  pagination:
    '@id': schema:pagination
    description: |
      Any description of pages that is not separated into pageStart and pageEnd;
      for example, "1-6, 9, 55".
    type: string
