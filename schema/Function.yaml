title: Function
'@id': stencila:Function
extends: Entity
category: flow
status: experimental
description: A function signature.
$comment: |
  This is a type used in Stencila Schema for describing callable functions in
  documents and execution contexts.

  It exists to represent function signatures structurally, including parameters
  and return types, so functions can be documented, exposed to tools, and
  invoked from executable nodes. This helps bridge document content with
  computational behavior.

  Key properties include the function `name`, `parameters`, and return-value
  description.
analogues:
  - name: OpenAPI operation signature
    url: https://spec.openapis.org/oas/latest.html
    notes: Approximate analogue for structured callable signatures with parameters and return-like schemas, though Stencila `Function` is language-agnostic and document-oriented.
required:
  - name
  - parameters
core:
  - returns
properties:
  name:
    '@id': schema:name
    description: The name of the function.
    type: string
    pattern: '[a-z_][A-z0-9_]*'
    $comment: |
      The name property is not required; this allows for anonymous functions
      (although these are not yet implemented in Stencila interpreters).
      The regex allows for snake_case and camelCase names but excludes
      PascalCase for parameter names.
  parameters:
    '@id': stencila:parameters
    description: The parameters of the function.
    type: array
    items:
      $ref: Parameter
  returns:
    '@id': stencila:returns
    description: The return type of the function.
    $ref: Validator
