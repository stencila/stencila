title: List
'@id': schema:ItemList
nick: lst
extends: Entity
category: prose
description: A list of items.
$comment: |
  This is an implementation of schema.org
  [`ItemList`](https://schema.org/ItemList), exposed in Stencila Schema as
  `List`.

  The type is renamed to use more familiar document-model vocabulary, and the
  schema.org properties `itemListElement` and `itemListOrder` are correspondingly
  exposed as `items` and `order`. In Stencila Schema it is used for ordered,
  unordered, and checklist-style document lists with rich item content.

  Key properties include `items`, `order`, and optional authorship metadata.
analogues:
  - id: html:ul
    notes: Close analogue for unordered lists; Stencila uses a single `List` type and records list style in `order` rather than separate element types.
  - id: html:ol
    notes: Close analogue for ordered lists; descending and checklist semantics are represented via `order` and item metadata rather than distinct HTML elements.
  - id: jats:list
    notes: Closest JATS container analogue for list content.
  - id: pandoc:BulletList
    notes: Close analogue for unordered lists; ordered and checklist forms are represented differently in Pandoc.
  - id: pandoc:OrderedList
    notes: Close analogue for ordered lists; Stencila unifies ordered and unordered lists in one node type.
  - id: mdast:List
    notes: Closest MDAST analogue for list containers, though task-list state is carried on items in Stencila.
dom:
  derive: false
html:
  special: true
jats:
  elem: list
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - items
  - order
core:
  - authors
  - provenance
properties:
  items:
    '@id': 'schema:itemListElement'
    description: The items in the list.
    type: array
    items:
      $ref: ListItem
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex, lexical, koenig]
    jats:
      content: true
    proptest:
      min:
        description: Generate a single, arbitrary, list item.
        strategy: vec(ListItem::arbitrary(), size_range(1..=1))
      low:
        description: Generate up to two, arbitrary, list items.
        strategy: vec(ListItem::arbitrary(), size_range(1..=2))
      high:
        description: Generate up to four, arbitrary, list items.
        strategy: vec(ListItem::arbitrary(), size_range(1..=4))
      max:
        description: Generate up to eight, arbitrary, list items.
        strategy: vec(ListItem::arbitrary(), size_range(1..=8))
  order:
    '@id': 'schema:itemListOrder'
    description: The ordering of the list.
    $ref: ListOrder
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex, lexical, koenig]
    jats:
      attr: list-type
    proptest:
      min:
        description: Always generate an unordered list.
        value: ListOrder::Unordered
      low:
        description: Randomly generate either an unordered, or ascending, list.
        strategy: prop_oneof![Just(ListOrder::Unordered),Just(ListOrder::Ascending)]
      high:
        description: Generate an arbitrary list ordering.
        strategy: ListOrder::arbitrary()
  authors:
    '@id': schema:author
    description: The authors of the list.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: div
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the content within the list.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: div
