title: TimeValidator
'@id': stencila:TimeValidator
nick: tmv
extends: Entity
category: data
description: A validator specifying the constraints on a time.
$comment: |
  This is a type used in Stencila Schema for validating [`Time`](./time.md) nodes.

  It exists so recurring times of day can be constrained within the same typed
  validator system used for other primitive and temporal values.

  Key properties define allowable ranges and related time constraints.
markdown:
  derive: false
core:
  - minimum
  - maximum
properties:
  minimum:
    '@id': stencila:minimum
    $ref: Time
    description: The inclusive lower limit for a time.
    $comment: |
      A time is valid if it is greater than, or exactly equal to, `minimum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  maximum:
    '@id': stencila:maximum
    $ref: Time
    description: The inclusive upper limit for a time.
    $comment: |
      A time is valid if it is less than, or exactly equal to, `maximum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
