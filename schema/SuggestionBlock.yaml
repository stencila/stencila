title: SuggestionBlock
'@id': stencila:SuggestionBlock
nick: sgb
extends: Suggestion
category: edits
description: Abstract base type for nodes that indicate a suggested change to block content.
$comment: |
  This is an abstract base type used in Stencila Schema for suggestions that operate on
  block content.

  It extends [`Suggestion`](./suggestion.md) so proposed changes to block-level
  nodes can share common suggestion behavior while remaining distinct from
  inline suggestions.

  Key properties are primarily inherited from [`Suggestion`](./suggestion.md),
  with semantics centered on block-content replacements and originals.
markdown:
  derive: false
required:
  - content
core:
  - original
properties:
  content:
    '@id': stencila:content
    description: The suggested content. For insertions and replacements, this is the new content; for deletions, this is the content being deleted.
    type: array
    items:
      $ref: Block
    dom:
      elem: div
    proptest:
      min:
        description: Generate a single fixed paragraph.
        value: vec![p([t("text")])]
      low:
        description: Generate a single arbitrary, non-recursive, block node
        strategy: vec_blocks_non_recursive(1)
      high:
        description: Generate up to two arbitrary, non-recursive, block nodes
        strategy: vec_blocks_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, block nodes
        strategy: vec_blocks_non_recursive(4)
  original:
    '@id': stencila:original
    description: The original content. For replacements, this is the content being replaced; for deletions, this should be absent.
    type: array
    items:
      $ref: Block
    dom:
      elem: div
