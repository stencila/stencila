title: HorizontalAlignment
"@id": stencila:HorizontalAlignment
extends: Enumeration
category: works
description: The horizontal alignment of content.
$comment: |
  This is an enumeration used in Stencila Schema for horizontal alignment.

  It is based on the JATS
  [`align`](https://jats.nlm.nih.gov/archiving/tag-library/1.2/attribute/align.html)
  attribute and gives Stencila a controlled vocabulary for left, right, center,
  justified, and character-based alignment. Using an enumeration allows these
  alignment semantics to be mapped consistently across table, layout, and
  publishing formats.

  See the alignment properties on table- and layout-related types that use this
  enumeration.
proptest: {}
default: AlignLeft
anyOf:
  - const: AlignLeft
    "@id": stencila:AlignLeft
    description: Left align content.
  - const: AlignRight
    "@id": stencila:AlignRight
    description: Right align content.
  - const: AlignJustify
    "@id": stencila:AlignJustify
    description: Fully justify cell content.
  - const: AlignCenter
    "@id": stencila:AlignCenter
    description: Center align the cell content.
  - const: AlignCharacter
    "@id": stencila:AlignCharacter
    description: Align the content on a character.
