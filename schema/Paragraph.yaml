title: Paragraph
'@id': stencila:Paragraph
nick: pgh
extends: Entity
category: prose
description: A paragraph.
$comment: |
  This is a type used in Stencila Schema for paragraph content.

  It exists to represent one of the main units of prose within the document
  model while also supporting authorship and provenance metadata not usually
  available on plain text paragraphs in simpler formats.

  Key properties include the inline `content`, together with optional `authors`
  and `provenance` metadata.
html:
  elem: p
jats:
  elem: p
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - authors
  - provenance
properties:
  content:
    '@id': stencila:content
    description: The contents of the paragraph.
    type: array
    items:
      $ref: Inline
    dom:
      elem: p
    proptest:
      min:
        description: Generate a single arbitrary inline node
        strategy: vec_inlines(1)
      low:
        description: Generate up to two arbitrary inline nodes
        strategy: vec_inlines(2)
      high:
        description: Generate up to four arbitrary inline nodes
        strategy: vec_inlines(4)
      max:
        description: Generate up to eight arbitrary inline nodes without restrictions on their order
        strategy: vec(Inline::arbitrary(), size_range(0..=8))
  authors:
    '@id': schema:author
    description: The authors of the paragraph.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: div
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of content within the paragraph.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: div
