title: ListOrder
'@id': schema:ItemListOrderType
extends: Enumeration
category: prose
description: The ordering of a list.
$comment: |
  This is an implementation of schema.org
  [`ItemListOrderType`](https://schema.org/ItemListOrderType).

  In Stencila Schema it is used by [`List`](./list.md) to represent ordering
  semantics in a controlled way that can be mapped to authoring and publishing
  formats.

  See [`List.order`](./list.md#order) for the property that uses this
  enumeration.
analogues:
  - id: schema:ItemListOrderType
  - name: HTML list type semantics
    url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/ol
    notes: Approximate analogue because HTML expresses ordered-versus-unordered distinctions structurally and has limited native support for descending order.
default: Unordered
proptest: {}
anyOf:
  - const: Ascending
    '@id': schema:Ascending
  - const: Descending
    '@id': schema:Descending
  - const: Unordered
    '@id': schema:Unordered
