title: Timestamp
'@id': schema:Timestamp
nick: tst
extends: Entity
category: data
description: A value that represents a point in time.
$comment: |
  This is a temporal type used in Stencila Schema for exact points in time.

  Although analogous to date-time concepts elsewhere, it exists separately in
  Stencila Schema because timestamps are heavily used for execution events,
  provenance, and document modification tracking. Modeling them explicitly
  clarifies their role as event times rather than general-purpose date-time
  metadata.

  See properties such as `executionEnded`, `lastModified`, and other
  timestamp-bearing metadata throughout the schema.
analogues:
  - name: Unix timestamp
    url: https://en.wikipedia.org/wiki/Unix_time
    notes: Closest external analogue, though Stencila stores the epoch offset together with explicit `timeUnit` rather than assuming seconds.
jats:
  elem: timestamp
  special: true
proptest: {}
required:
  - value
  - timeUnit
properties:
  value:
    '@id': schema:value
    description: The time, in `timeUnit`s, before or after the Unix Epoch (1970-01-01T00:00:00Z).
    type: integer
  timeUnit:
    '@id': stencila:timeUnit
    description: The time unit that the `value` represents.
    $ref: TimeUnit
