title: QuoteBlock
'@id': stencila:QuoteBlock
nick: qtb
extends: Entity
category: prose
description: A section quoted from somewhere else.
$comment: |
  This is a block type used in Stencila Schema for quoted content.

  It exists to represent extended quotations as structured block content,
  distinct from both inline quotation and untyped paragraphs. This helps
  preserve attribution, provenance, and format mappings for quoted material.

  Key properties include the quoted `content` and any citation or source
  metadata associated with the quotation.
jats:
  elem: disp-quote 
html:
  elem: blockquote
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - source
  - authors
  - provenance
properties:
  source:
    '@id': stencila:source
    description: The source of the quote.
    anyOf:
      - $ref: Citation
      - $ref: Text
  content:
    '@id': stencila:content
    description: The content of the quote.
    type: array
    items:
      $ref: Block
    dom:
      elem: blockquote
    proptest:
      min:
        description: Generate a single arbitrary paragraph.
        strategy: vec_paragraphs(1)
      low:
        description: Generate up to two arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(2)
      high:
        description: Generate up to four arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(4)
      max:
        description: Generate up to eight arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(8)
  authors:
    '@id': schema:author
    description: The authors of the quote.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: div
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the content within the section.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: div
