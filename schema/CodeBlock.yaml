title: CodeBlock
'@id': stencila:CodeBlock
nick: cdb
extends: CodeStatic
category: code
description: A code block.
$comment: |
  This is a block representation used in Stencila Schema for non-executable
  code.

  It extends [`CodeStatic`](./code-static.md) for code that should be displayed
  and preserved as document content without normal execution semantics. Stencila
  also adds optional demo compilation behavior so some static code blocks can
  render derived content while remaining distinct from executable code chunks.

  Key properties are inherited from [`CodeStatic`](./code-static.md), with
  Stencila Schema behavior centered on `isDemo`, `content`, and the associated
  compilation properties.
analogues:
  - id: html:pre
  - id: jats:code
  - id: pandoc:CodeBlock
  - id: mdast:Code
    notes: Closest MDAST analogue for fenced or indented code blocks.
dom:
  derive: false
html:
  elem: pre
jats:
  elem: code
latex:
  derive: false
markdown:
  derive: false
proptest: {}
core:
  - isDemo
properties:
  isDemo:
    '@id': stencila:isDemo
    description: Whether the code block is a demo that should also be rendered.
    $comment: |
      When true, the code in the block is decoded using the format indicated by
      `programmingLanguage` and rendered as block content below the code display.
    type: boolean
    patch:
      formats: [md, smd, myst, qmd]
  compilationDigest:
    '@id': stencila:compilationDigest
    description: A digest of the `code` and `programmingLanguage`.
    $comment: Used to avoid unnecessary re-compilation of demo content.
    $ref: CompilationDigest
    strip: [compilation]
    dom:
      skip: true
  compilationMessages:
    '@id': stencila:compilationMessages
    description: Messages generated while compiling the demo content.
    strip: [compilation]
    type: array
    items:
      $ref: CompilationMessage
    dom:
      elem: span
  content:
    '@id': stencila:content
    description: The content rendered from the code when `isDemo` is true.
    type: array
    items:
      $ref: Block
    walk: true
    strip: [output]
    patch:
      formats: []
    dom:
      elem: div
