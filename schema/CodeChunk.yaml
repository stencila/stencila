title: CodeChunk
"@id": stencila:CodeChunk
nick: cdc
extends: CodeExecutable
category: code
description: An executable code chunk.
$comment: |
  This is an executable code block used in Stencila Schema, analogous to notebook code
  cells and executable code fences in other authoring systems.

  It extends [`CodeExecutable`](./code-executable.md) to support execution
  outputs, captions, automatic labeling, and optional SVG overlays for figures
  and tables derived from code. This makes code chunks central to literate
  programming and executable document workflows in Stencila.

  Key properties include `outputs`, `caption`, `labelType`, `label`, `overlay`,
  and inherited execution properties from
  [`CodeExecutable`](./code-executable.md).
analogues:
  - name: Jupyter notebook code cell
    url: https://nbformat.readthedocs.io/
    notes: Closest executable-authoring analogue for a code cell with outputs, though Stencila additionally supports captions, labels, and overlays.
  - id: myst:directive:code-cell
    notes: Close MyST analogue for executable code blocks in document authoring.
dom:
  derive: false
jats:
  elem: code
  attrs:
    executable: "yes"
latex:
  derive: false
markdown:
  derive: false
text:
  derive: false
proptest: {}
core:
  - labelType
  - label
  - labelAutomatically
  - caption
  - overlay
  - outputs
  - isEchoed
  - isHidden
properties:
  labelType:
    "@id": stencila:labelType
    description: The type of the label for the chunk.
    $comment: |
      Used during automatic sequential numbering of figures and tables within the document.
      Without this property it is not possible to know if the chunk should be in the
      series of figures, or in the series of tables.
    $ref: LabelType
    patch:
      formats: [md, smd, myst, ipynb, qmd, ipynb]
    jats:
      attr: label-type
    proptest:
      min:
        description: No label type
        value: None
      low:
        description: Generate either FigureLabel or TableLabel
        strategy: option::of(prop_oneof![Just(LabelType::FigureLabel), Just(LabelType::TableLabel)])
  label:
    "@id": stencila:label
    description: A short label for the chunk.
    type: string
    patch:
      formats: [md, smd, myst, ipynb, qmd, ipynb]
    jats:
      elem: label
    proptest:
      min:
        description: No label
        value: None
      low:
        description: Generate a simple label
        strategy: option::of(r"[a-zA-Z0-9]+")
      max:
        description: Generate an arbitrary string
        strategy: option::of(String::arbitrary())
  labelAutomatically:
    "@id": stencila:labelAutomatically
    description: Whether the label should be automatically updated.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  caption:
    "@id": schema:caption
    description: A caption for the chunk.
    type: array
    items:
      $ref: Block
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      elem: div
    jats:
      elem: caption
    proptest:
      min:
        description: No caption
        value: None
      low:
        description: Generate up to two arbitrary paragraphs.
        strategy: option::of(vec_paragraphs(2))
  overlay:
    '@id': stencila:overlay
    description: |
      An optional SVG overlay rendered on top of the chunk's visual content.
      The SVG is positioned absolutely over the content area and scales
      proportionally using the SVG viewBox. Used for annotations such as
      arrows, callouts, bounding boxes, and labels.
    type: string
    patch:
      formats: [md, smd]
  overlayCompiled:
    '@id': stencila:overlayCompiled
    description: |
      The compiled SVG overlay with all custom elements expanded to
      standard SVG. Generated during compilation from the overlay
      source. When present, renderers use this instead of overlay.
    type: string
    strip: [output]
    patch:
      formats: []
  overlayCompilationDigest:
    '@id': stencila:overlayCompilationDigest
    description: A digest of the overlay property.
    $comment: Used to avoid unnecessary recompilation of the overlay.
    $ref: CompilationDigest
    strip: [compilation]
  overlayCompilationMessages:
    '@id': stencila:overlayCompilationMessages
    description: Messages generated while compiling the overlay.
    strip: [compilation]
    type: array
    items:
      $ref: CompilationMessage
    dom:
      elem: span
  outputs:
    "@id": stencila:outputs
    description: Outputs from executing the chunk.
    type: array
    items:
      $ref: Node
    walk: true
    strip: [output]
    patch:
      # Outputs are support by Jupyter Notebooks
      formats: [ipynb]
    serde:
      # Avoid default `option_one_or_many` deserialize which can't be used for this array of nodes
      deserializeWith: none
    dom:
      elem: div
  isEchoed:
    '@id': stencila:isEchoed
    description: Whether the code should be displayed to the reader.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  isHidden:
    '@id': stencila:isHidden
    description: Whether the outputs should be hidden from the reader.
    type: boolean
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  executionPure:
    "@id": stencila:executionPure
    description: Whether the code should be treated as side-effect free when executed.
    strip: [execution]
    type: boolean
