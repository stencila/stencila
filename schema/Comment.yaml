title: Comment
'@id': schema:Comment
extends: CreativeWork
category: works
markdown:
  derive: false
description: A comment on an item.
$comment: |
  This is an implementation of schema.org
  [`Comment`](https://schema.org/Comment), adapted in Stencila Schema for
  structured document review and discussion.

  It is used not only for comments on whole works, but also for comments on
  specific document regions or code locations. Stencila emphasizes structured
  block content over plain-text comment bodies and adds explicit location fields
  to support annotation and review workflows.

  Key properties include `about`, `content`, `startLocation`, `endLocation`, and
  `parentItem`.
analogues:
  - id: schema:Comment
  - id: html:aside
    notes: Approximate HTML analogue for side commentary, though HTML does not provide built-in region-targeting or threaded comment semantics.
required:
  - content
core:
  - authors
  - datePublished
properties:
  content:
    '@id': stencila:content
    description: Content of the comment, usually one or more paragraphs.
    $comment: |
      Most comments will have a single paragraph but could have multiple
      paragraphs, tables and even figures.
    type: array
    items:
      $ref: Block
    dom:
      elem: aside
  parentItem:
    '@id': schema:parentItem
    description: The parent comment of this comment.
    $ref: Comment
  startLocation:
    '@id': stencila:startLocation
    description: The location where the commented region begins.
    $comment: |
      A flexible location string. Use `#id` format (with leading `#`) to reference
      a node by `id` within the current document (e.g. a `Boundary` node or a figure).
      Use `file:line:column` format for source code locations. When set without
      `endLocation`, the comment targets a single point or node.
    type: string
  endLocation:
    '@id': stencila:endLocation
    description: The location where the commented region ends.
    $comment: |
      A flexible location string with the same format as `startLocation`. When both
      `startLocation` and `endLocation` are set, the comment targets a range. Both
      may be omitted when the comment applies to the document as a whole.
    type: string
