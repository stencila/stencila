title: VideoObject
'@id': schema:VideoObject
extends: MediaObject
category: works
description: A video file.
$comment: |
  This is an implementation of schema.org
  [`VideoObject`](https://schema.org/VideoObject).

  In Stencila Schema it is used both as media metadata and as rendered document
  content, especially in figures and multimedia documents. It inherits file and
  media capabilities from [`MediaObject`](./media-object.md) while adding
  video-specific descriptive properties.

  Key properties include `caption`, `thumbnail`, and `transcript`, with broader
  media metadata inherited from [`MediaObject`](./media-object.md).
analogues:
  - id: schema:VideoObject
  - id: html:video
  - id: jats:inline-media
    notes: Closest JATS analogue for embedded video-like media, though JATS uses a generic media element rather than a dedicated video element.
dom:
  derive: false
html:
  elem: video
  special: true
jats:
  elem: inline-media
  special: true
markdown:
  derive: false
proptest: {}
core:
  - caption
  - title
properties:
  caption:
    '@id': schema:caption
    description: The caption for this video recording.
    type: array
    items:
      $ref: Inline
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    html:
      attr: alt
  thumbnail:
    '@id': schema:thumbnail
    description: Thumbnail image of this video recording.
    $ref: ImageObject
  transcript:
    '@id': schema:transcript
    description: The transcript of this video recording.
    type: string
