title: NoteType
'@id': stencila:NoteType
extends: Enumeration
category: prose
description: A category of note placement.
$comment: |
  This is an enumeration used in Stencila Schema for note placement and behavior.

  It exists so notes can be rendered and transformed consistently across formats
  while preserving their semantic role, such as footnotes or endnotes, rather
  than only their presentation.

  See [`Note.noteType`](./note.md#notetype) for the property that uses this
  enumeration.
analogues:
  - name: JATS fn-type values
    url: https://jats.nlm.nih.gov/articleauthoring/tag-library/1.3/attribute/fn-type.html
    notes: Close JATS analogue for classifying note kinds, though Stencila focuses on placement-oriented note types such as footnote, endnote, and sidenote.
proptest: {}
default: Footnote
anyOf:
  - const: Footnote
    '@id': stencila:Footnote
  - const: Endnote
    '@id': stencila:Endnote
  - const: Sidenote
    '@id': stencila:Sidenote
