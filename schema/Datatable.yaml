title: Datatable
'@id': stencila:Datatable
nick: dtb
extends: CreativeWork
category: data
description: A table of data.
$comment: |
  This is a type used in Stencila Schema for column-oriented tabular data.

  Although it is conceptually related to schema.org tables, it is modeled
  separately to support typed columns, data hints, and data-oriented workflows
  distinct from presentation-first tables. This makes it suitable for executable
  documents, data inspection, validation, and transformations between tabular
  and analytical representations.

  Key properties include `columns`, `caption`, `notes`, and optional labeling
  metadata inherited from [`CreativeWork`](./creative-work.md).
dom:
  derive: false
markdown:
  derive: false
required:
  - columns
core:
  - label
  - labelAutomatically
  - caption
  - notes
properties:
  label:
    '@id': stencila:label
    description: A short label for the datatable.
    type: string
  labelAutomatically:
    '@id': stencila:labelAutomatically
    description: Whether the datatable label should be automatically updated.
    type: boolean
  caption:
    '@id': schema:caption
    description: A caption for the datatable.
    type: array
    items:
      $ref: Block
    walk: true
    dom:
      elem: div
  columns:
    '@id': stencila:columns
    description: The columns of data.
    type: array
    items:
      $ref: DatatableColumn
  notes:
    '@id': schema:notes
    description: Notes for the datatable.
    type: array
    items:
      $ref: Block
    walk: true
    dom:
      elem: div
