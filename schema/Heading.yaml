title: Heading
'@id': stencila:Heading
extends: Entity
category: prose
description: A heading.
$comment: |
  This is a type used in Stencila Schema for document headings.

  It exists to represent heading content and hierarchy explicitly, with
  additional support for document labeling, authorship, and provenance. This
  makes headings more than presentational text and allows them to participate in
  sectioning, appendix numbering, and document navigation workflows.

  Key properties include `level`, `content`, `labelType`, and `label`.
dom:
  derive: false
jats:
  elem: title
  special: true
html:
  special: true
latex:
  derive: false
markdown:
  derive: false
proptest: {}
required:
  - level
  - content
core:
  - labelType
  - label
  - authors
  - provenance
properties:
  labelType:
    "@id": stencila:labelType
    description: The type of the label for the appendix (if present, should be `AppendixLabel`).
    $ref: LabelType
    proptest:
      min:
        description: No label type
        value: None
  label:
    "@id": stencila:label
    description: A short label for the heading.
    type: string
    proptest:
      min:
        description: No label
        value: None
  level:
    '@id': stencila:level
    description: The level of the heading.
    type: integer
    default: 0
    minimum: 0
    maximum: 6
    patch:
      formats: [md, smd, myst, ipynb, qmd, latex, lexical, koenig]
    proptest:
      min:
        description: Fixed value of 1
        value: '1'
      low:
        description: Generate values between 1 and 6
        strategy: 1..=6i64
      high:
        description: Generate values between 0 and 6
        strategy: 0..=6i64
      max:
        description: Generate an arbitrary value
        strategy: i64::arbitrary()
  content:
    '@id': stencila:content
    description: Content of the heading.
    type: array
    items:
      $ref: Inline
    proptest:
      min:
        description: Generate a single arbitrary inline node
        strategy: vec_inlines(1)
      low:
        description: Generate up to two arbitrary inline nodes
        strategy: vec_inlines(2)
      high:
        description: Generate up to four arbitrary inline nodes
        strategy: vec_inlines(4)
      max:
        description: Generate up to eight arbitrary inline nodes without restrictions on their order
        strategy: vec(Inline::arbitrary(), size_range(0..=8))
  authors:
    '@id': schema:author
    description: The authors of the heading.
    type: array
    items:
      $ref: Author
    strip: [authors]
    serde:
      deserializeWith: option_one_or_many_string_or_object
    dom:
      elem: span
  provenance:
    '@id': stencila:provenance
    description: A summary of the provenance of the content within the heading.
    type: array
    items:
      $ref: ProvenanceCount
    strip: [provenance]
    dom:
      elem: span
