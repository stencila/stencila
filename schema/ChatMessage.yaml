title: ChatMessage
'@id': stencila:ChatMessage
nick: chm
extends: Executable
category: works
status: beta
description: A message within a `Chat`.
$comment: |
  This is an executable type used in Stencila Schema for an individual message within a
  [`Chat`](./chat.md).

  It exists so messages can carry structured parts, execution state,
  attachments, and model-generated metadata rather than being reduced to plain
  text. This supports richer conversational documents and tooling for reviewing,
  replaying, or transforming model interactions.

  Key properties include the message role, message parts or content, and
  inherited execution metadata from [`Executable`](./executable.md).
analogues:
  - name: OpenAI chat message
    url: https://platform.openai.com/docs/guides/text-generation
    notes: Close analogue for role-based conversational turns, though Stencila messages can include block document content and attached files.
  - name: Anthropic message
    url: https://docs.anthropic.com/
    notes: Close provider-level analogue for structured chat turns.
markdown:
  derive: false
required:
  - role
  - content
properties:
  author:
    '@id': schema:author
    description: The author of the message
    $ref: Author
    dom:
      elem: div
  role:
    '@id': stencila:role
    description: The role of the message in the conversation.
    $ref: MessageRole
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      # Avoid clash with the HTML `role` attribute by using alias
      attr: message-role
  content:
    '@id': stencila:content
    description: The content of the message.
    type: array
    items:
      $ref: Block
    dom:
      elem: div
  files:
    '@id': stencila:files
    description: The content of the message.
    type: array
    items:
      $ref: File
    dom:
      elem: div
  isSelected:
    '@id': stencila:isSelected
    description: Whether this message is the selected message in the parent `ChatMessageGroup`
    type: boolean
