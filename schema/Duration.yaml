title: Duration
'@id': schema:Duration
extends: Entity
category: data
description: A value that represents the difference between two timestamps.
$comment: |
  This is an implementation of schema.org
  [`Duration`](https://schema.org/Duration).

  In Stencila Schema it is represented as a typed node because durations are
  commonly produced by execution, attached to metadata, and rendered in
  documents. Modeling them explicitly allows validation and serialization
  without losing the distinction between a duration and a timestamp.

  See also temporal types such as [`Time`](./time.md) and
  [`Timestamp`](./timestamp.md).
analogues:
  - id: schema:Duration
  - name: ISO 8601 duration
    url: https://en.wikipedia.org/wiki/ISO_8601#Durations
    notes: Close external duration analogue, though Stencila stores duration as numeric `value` plus explicit `timeUnit` rather than a single encoded string.
jats:
  elem: duration
  special: true
proptest: {}
required:
  - value
  - timeUnit
properties:
  value:
    '@id': schema:value
    description: The time difference in `timeUnit`s.
    type: integer
  timeUnit:
    '@id': stencila:timeUnit
    description: The time unit that the `value` represents.
    $ref: TimeUnit
