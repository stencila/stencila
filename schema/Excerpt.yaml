title: Excerpt
"@id": stencila:Excerpt
nick: exc
extends: Entity
description: An excerpt from a `CreativeWork`.
$comment: |
  This is a type used in Stencila Schema for representing an excerpt from another
  creative work.

  It exists to preserve the distinction between quoted or extracted material and
  original document content, while allowing references back to the source work.
  This is useful in research, review, and annotation workflows where excerpts
  need structured attribution.

  Key properties include the excerpted `content` and links to the source work or
  location.
markdown:
  derive: false
required:
  - source
  - nodePath
  - nodeTypes
  - content
properties:
  source:
    "@id": stencila:source
    description: A `Reference` to the `CreativeWork` that the excerpt was taken from.
    $ref: Reference
    strip: [metadata]
    dom:
      elem: div
  nodePath:
    "@id": stencila:nodePath
    description: The path to the node that was excepted.
    type: string
    strip: [metadata]
  nodeTypes:
    "@id": stencila:nodeTypes
    description: The types of the ancestor nodes and the node that was excerpted.
    type: string
    strip: [metadata]
  content:
    "@id": stencila:content
    description: The excerpted content.
    type: array
    items:
      $ref: Block
    strip: [content]
    dom:
      elem: div
