title: CallArgument
'@id': stencila:CallArgument
nick: cla
status: experimental
extends: Parameter
category: flow
description: An argument used when calling a document.
$comment: |
  This is an executable type used in Stencila Schema for arguments passed to a
  [`CallBlock`](./call-block.md).

  It extends [`Parameter`](./parameter.md) with executable code so an argument's
  value can be computed dynamically rather than supplied only as a static value.
  This supports parameterized document calls and reusable document components.

  Key properties include the argument `name`, `code`, `value`, and
  `programmingLanguage`.
markdown:
  derive: false
proptest: {}
required:
  - code
core:
  - programmingLanguage
properties:
  code:
    '@id': stencila:code
    description: The code to be evaluated for the parameter.
    $ref: Cord
    strip: [code]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    proptest:
      min:
        description: Generate a simple fixed string of code.
        value: Cord::from("code")
      low:
        description: |
          Generate a random string of up to 10 alphanumeric characters.
        strategy: r"[a-zA-Z0-9]{1,10}".prop_map(Cord::from)
      high:
        description: |
          Generate a random string of up to 100 characters (excluding control characters).
        strategy: r"[^\p{C}]{1,100}".prop_map(Cord::from)
      max:
        description: Generate an arbitrary string.
        strategy: String::arbitrary().prop_map(Cord::from)
  value:
    '@id': schema:value
    description: The current value of the argument.
    $ref: Node
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  programmingLanguage:
    '@id': schema:programmingLanguage
    description: The programming language of the code.
    type: string
    strip: [code]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
