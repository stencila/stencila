title: Boundary
'@id': stencila:Boundary
nick: bdy
extends: Entity
category: prose
description: A positional boundary marker within inline content.
$comment: |
  This is a type used in Stencila Schema for representing the boundary of a selection
  or range within content.

  It exists to support editing, review, and provenance workflows that need to
  refer precisely to positions in document content without flattening the
  document structure into plain text offsets. This makes it useful for
  instructions, suggestions, and other document transformations.

  Key properties identify the boundary location and its relationship to
  surrounding content.
analogues:
  - name: DOM Range boundary point
    url: https://dom.spec.whatwg.org/#concept-range-bp
    notes: Close conceptual analogue for a position at a node-and-offset boundary, though Stencila uses a document-model node rather than an ephemeral API object.
  - name: ProseMirror position marker
    url: https://prosemirror.net/docs/guide/
    notes: Approximate editor-model analogue for addressing positions in structured content.
markdown:
  derive: false
