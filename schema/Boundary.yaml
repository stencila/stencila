title: Boundary
'@id': stencila:Boundary
nick: bdy
extends: Entity
category: prose
markdown:
  derive: false
description: |
  A positional marker within inline content used to define the boundary
  of a cross-block range. Boundaries are referenced by their `id` from
  other nodes (e.g. `Comment.startLocation` and `Comment.endLocation`) to
  delimit regions that may span across multiple blocks.
