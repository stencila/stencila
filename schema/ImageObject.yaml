title: ImageObject
'@id': schema:ImageObject
nick: img
extends: MediaObject
category: works
description: An image file.
$comment: |
  This is an implementation of schema.org
  [`ImageObject`](https://schema.org/ImageObject).

  In Stencila Schema it is used both as media metadata and as rendered document
  content, often within figures, annotations, and rich inline content. It
  inherits file and media capabilities from [`MediaObject`](./media-object.md)
  while fitting naturally into Stencila's document node model.

  Key properties are usually inherited from [`MediaObject`](./media-object.md),
  especially content location, media type, dimensions, and descriptive text.
dom:
  derive: false
html:
  elem: img
  special: true
jats:
  elem: inline-graphic
  special: true
latex:
  derive: false
markdown:
  derive: false
core:
  - caption
  - title
proptest: {}
properties:
  caption:
    '@id': schema:caption
    description: The caption for this image.
    html:
      attr: alt
    type: array
    items:
      $ref: Inline
    patch:
      formats: [md, smd, myst, ipynb, qmd, lexical, koenig]
    dom:
      elem: span
  thumbnail:
    '@id': schema:thumbnail
    description: Thumbnail image of this image.
    $ref: ImageObject
