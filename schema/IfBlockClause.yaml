title: IfBlockClause
'@id': stencila:IfBlockClause
nick: ibc
extends: CodeExecutable
category: flow
description: A clause within an `IfBlock` node.
$comment: |
  This is an executable clause used in Stencila Schema within an
  [`IfBlock`](./if-block.md).

  It exists to represent each condition-and-content pair as a first-class node
  with its own executable state, rather than flattening conditional logic into
  unstructured text. This supports better tooling, provenance, and execution
  diagnostics.

  Key properties include the conditional expression, clause `content`, and
  inherited execution properties from [`CodeExecutable`](./code-executable.md).
analogues:
  - name: Jinja if/elif/else clause
    url: https://jinja.palletsprojects.com/
    notes: Close clause-level analogue for one branch within a conditional template block.
status: beta
markdown:
  derive: false
proptest: {}
required:
  - content
core:
  - isActive
properties:
  isActive:
    '@id': stencila:isActive
    description: Whether this clause is the active clause in the parent `IfBlock` node
    type: boolean
    strip: [output]
  content:
    '@id': stencila:content
    description: The content to render if the result is truthy
    type: array
    items:
      $ref: Block
    dom:
      elem: div
    html:
      slot: div
    proptest:
      min:
        description: A single, simple paragraph.
        value: vec![p([t("If clause content")])]
      low:
        description: Generate up to two arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(2)
      max:
        description: Generate up to four arbitrary, non-recursive, block nodes.
        strategy: vec_blocks_non_recursive(4)
