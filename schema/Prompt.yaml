title: Prompt
"@id": stencila:Prompt
extends: [CreativeWork, Executable]
category: works
description: A prompt for creating or editing document content.
$comment: |
  This is an executable creative work used in Stencila Schema for creating or editing
  content.

  It combines [`CreativeWork`](./creative-work.md) metadata with
  [`Executable`](./executable.md) behavior so prompts can be versioned,
  documented, rendered in context, and used reproducibly across AI-assisted
  workflows. Unlike a plain text prompt, it can declare supported instruction
  types, node targets, and query-matching behavior.

  Key properties include `instructionTypes`, `nodeTypes`, `nodeCount`,
  `queryPatterns`, `content`, and `frontmatter`. Additional metadata and
  execution features are inherited from [`CreativeWork`](./creative-work.md) and
  [`Executable`](./executable.md).
markdown:
  derive: false
required:
  - name
  - title
  - description
  - version
  - instructionTypes
  - content
core:
  - frontmatter
  - nodeTypes
  - nodeCount
  - queryPatterns
properties:
  frontmatter:
    "@id": stencila:frontmatter
    description: Frontmatter containing document metadata.
    $comment: Currently assumed to be YAML or JSON.
    type: string
    strip: [metadata]
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  instructionTypes:
    "@id": stencila:instructionTypes
    description: The types of instructions that the prompt supports
    type: array
    items:
      $ref: InstructionType
  nodeTypes:
    "@id": stencila:nodeTypes
    description: The types of nodes that the prompt supports
    type: array
    items:
      type: string
  nodeCount:
    "@id": stencila:nodeCount
    description: The number of nodes that the prompt supports
    $comment: |
      Use a string to indicate a range of possible node counts e.g. "1+" for one
      or more nodes, "1-5" for one to five nodes.
    anyOf:
      - $ref: UnsignedInteger
      - type: string
  queryPatterns:
    "@id": stencila:queryPatterns
    description: Regular expressions used to match the prompt with a user query
    type: array
    items:
      type: string
  content:
    "@id": stencila:content
    description: The content of the prompt.
    type: array
    items:
      $ref: Block
    dom:
      elem: section
