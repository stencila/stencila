title: InstructionInline
'@id': stencila:InstructionInline
nick: isi
extends: Instruction
category: edits
description: An instruction to edit some inline content.
$comment: |
  This is an inline instruction type used in Stencila Schema.

  It extends [`Instruction`](./instruction.md) for editing or generating inline
  content within prose. This lets Stencila support fine-grained model-assisted
  edits without collapsing inline editing into block-level operations.

  Key properties are mostly inherited from [`Instruction`](./instruction.md),
  with semantics focused on inline targets and suggestions.
analogues:
  - name: inline edit request
    url: https://platform.openai.com/docs/guides/text-generation
    notes: Approximate analogue for a fine-grained editing instruction targeting spans within prose.
patch:
  applyWith: "InstructionInline::apply_with"
proptest: {}
core:
  - content
  - suggestions
properties:
  content:
    '@id': stencila:content
    description: The content to which the instruction applies.
    type: array
    items:
      $ref: Inline
    walk: true
    dom:
      elem: span
    proptest:
      min:
        description: No content
        value: None
      low:
        description: Generate a single arbitrary, non-recursive, inline node
        strategy: option::of(vec_inlines_non_recursive(1))
      high:
        description: Generate up to two arbitrary, non-recursive, inline nodes
        strategy: option::of(vec_inlines_non_recursive(2))
      max:
        description: Generate up to four arbitrary, non-recursive, inline nodes
        strategy: option::of(vec_inlines_non_recursive(4))
  suggestions:
    '@id': stencila:suggestions
    description: Suggestions for the instruction
    type: array
    items:
      $ref: SuggestionInline
    walk: true
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    dom:
      elem: span
