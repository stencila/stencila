title: TableCellType
"@id": stencila:TableCellType
extends: Enumeration
category: works
description: The structural role of a table cell.
$comment: |
  This is an enumeration used in Stencila Schema for table cell roles.

  It exists so table cells can be identified as data cells or header cells using
  a stable vocabulary that maps cleanly to HTML, JATS, and other tabular
  formats.

  See [`TableCell.cellType`](./table-cell.md#celltype) for the property that
  uses this enumeration.
analogues:
  - name: HTML td/th distinction
    url: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/td
    notes: Close analogue because HTML distinguishes data and header cells structurally with separate elements rather than an enumeration.
proptest: {}
default: DataCell
anyOf:
  - const: DataCell
    "@id": stencila:DataCell
  - const: HeaderCell
    "@id": stencila:HeaderCell
