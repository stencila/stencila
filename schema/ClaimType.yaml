title: ClaimType
'@id': stencila:ClaimType
extends: Enumeration
category: works
description: A category of claim.
$comment: |
  This is an enumeration used in Stencila Schema for classifying [`Claim`](./claim.md)
  nodes.

  It exists so claim-oriented workflows can distinguish different kinds of
  reviewable statements without relying on free-text labels. The enumeration
  supports consistent downstream behavior in interfaces, validation, and
  publishing.

  See [`Claim.claimType`](./claim.md#claimtype) for the property that uses this
  enumeration.
default: Statement
anyOf:
  - const: Statement
    '@id': stencila:Statement
  - const: Theorem
    '@id': stencila:Theorem
  - const: Lemma
    '@id': stencila:Lemma
  - const: Proof
    '@id': stencila:Proof
  - const: Postulate
    '@id': stencila:Postulate
  - const: Hypothesis
    '@id': stencila:Hypothesis
  - const: Proposition
    '@id': stencila:Proposition
  - const: Corollary
    '@id': stencila:Corollary
