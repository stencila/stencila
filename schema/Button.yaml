title: Button
'@id': stencila:Button
extends: CodeExecutable
category: flow
status: experimental
description: An interactive button.
$comment: |
  This is an executable type used in Stencila Schema for interactive button controls
  embedded in documents.

  It extends [`CodeExecutable`](./code-executable.md) so button activation can
  trigger execution behavior while still participating in the document node
  model. This allows published or interactive documents to expose lightweight
  actions without requiring a separate application UI.

  Key properties are primarily inherited from
  [`CodeExecutable`](./code-executable.md), including execution configuration,
  code, and outputs.
html:
  elem: button
required:
  - name
core:
  - label
properties:
  name:
    '@id': schema:name
    description: The name of the variable associated with the button.
    type: string
    pattern: '[a-zA-Z][a-zA-Z0-9_]*'
    $comment: |
      This regex allows for snake_case and camelCase names but excludes
      PascalCase for names.
  label:
    '@id': stencila:label
    description: A label for the button
    type: string
    $comment: |
      The button label will default to the title cased `name` if not specified.
  isDisabled:
    '@id': stencila:isDisabled
    description: Whether the button is currently disabled
    $comment: A button is disabled when it has a code expression and that expression evaluates to a falsy value
    type: boolean
