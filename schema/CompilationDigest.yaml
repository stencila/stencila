title: CompilationDigest
'@id': stencila:CompilationDigest
nick: cmd
extends: Entity
category: flow
description: A digest of an executable node and its dependencies.
$comment: |
  This is a type used in Stencila Schema for recording a digest of executable content
  and its dependencies.

  It exists to support incremental compilation and cache invalidation across
  executable document nodes. Rather than reprocessing content unconditionally,
  Stencila can compare digests to determine whether derived outputs or compiled
  artifacts are still current.

  This type is commonly used by properties such as `compilationDigest` and
  related compilation metadata on [`Executable`](./executable.md) and derived
  types.
required:
  - stateDigest
core:
  - semanticDigest
  - dependenciesDigest
  - dependenciesStale
  - dependenciesFailed
properties:
  stateDigest:
    '@id': stencila:stateDigest
    description: A digest of the state of a node.
    $ref: UnsignedInteger
  semanticDigest:
    '@id': stencila:semanticDigest
    description: A digest of the semantics of the node with respect to the dependency graph.
    $ref: UnsignedInteger
  dependenciesDigest:
    '@id': stencila:dependenciesDigest
    description: A digest of the semantic digests of the dependencies of a node.
    $ref: UnsignedInteger
  dependenciesStale:
    '@id': stencila:dependenciesStale
    description: A count of the number of dependencies that are stale.
    $ref: UnsignedInteger
  dependenciesFailed:
    '@id': stencila:dependenciesFailed
    description: A count of the number of dependencies that failed.
    $ref: UnsignedInteger
