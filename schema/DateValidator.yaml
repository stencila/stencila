title: DateValidator
'@id': stencila:DateValidator
nick: dav
extends: Entity
category: data
description: A validator specifying the constraints on a date.
$comment: |
  This is a type used in Stencila Schema for validating [`Date`](./date.md) nodes.

  It exists so Stencila documents and forms can express constraints over
  calendar dates as structured data rather than leaving validation to ad hoc
  string parsing. This keeps date validation aligned with the rest of the
  validator system.

  Key properties define allowable date ranges and related constraints.
markdown:
  derive: false
core:
  - minimum
  - maximum
properties:
  minimum:
    '@id': stencila:minimum
    $ref: Date
    description: The inclusive lower limit for a date.
    $comment: |
      A date is valid if it is greater than, or exactly equal to, `minimum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
  maximum:
    '@id': stencila:maximum
    $ref: Date
    description: The inclusive upper limit for a date.
    $comment: |
      A date is valid if it is less than, or exactly equal to, `maximum`.
    patch:
      formats: [md, smd, myst, ipynb, qmd]
