title: AudioObject
'@id': schema:AudioObject
extends: MediaObject
category: works
description: An audio file.
$comment: |
  This is an implementation of schema.org
  [`AudioObject`](https://schema.org/AudioObject).

  In Stencila Schema it is used as inline or block media within executable and
  publishable documents, inheriting media metadata and file-location
  capabilities from [`MediaObject`](./media-object.md). This makes audio usable
  not only as linked metadata but also as rendered document content.

  Key properties are usually inherited from [`MediaObject`](./media-object.md),
  especially those describing content URLs, media type, and alternate text.
dom:
  derive: false
html:
  elem: audio
  special: true
jats:
  elem: inline-media
  special: true
markdown:
  derive: false
proptest: {}
core:
  - caption
  - title
properties:
  caption:
    '@id': schema:caption
    description: The caption for this audio recording.
    type: array
    items:
      $ref: Inline
    patch:
      formats: [md, smd, myst, ipynb, qmd]
    html:
      attr: alt
  transcript:
    '@id': schema:transcript
    description: The transcript of this audio recording.
    type: string
