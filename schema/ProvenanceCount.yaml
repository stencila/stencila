title: ProvenanceCount
'@id': stencila:ProvenanceCount
nick: prc
extends: Entity
description: The count of the number of characters in a `ProvenanceCategory` within an entity.
$comment: |
  This is a type used in Stencila Schema for summarizing how much content belongs to a
  provenance category.

  It exists to attach compact provenance summaries to document nodes without
  repeating provenance annotations on every character or child node. This
  supports interfaces that report authorship and AI involvement at a glance.

  Key properties include the provenance `category` and the associated character
  or content count.
required:
  - provenanceCategory
  - characterCount
core:
  - characterPercent
properties:
  provenanceCategory:
    '@id': stencila:provenanceCategory
    description: The provenance category that the character count applies to.
    $ref: ProvenanceCategory
  characterCount:
    '@id': stencila:characterCount
    description: The number of characters in the provenance category.
    $ref: UnsignedInteger
  characterPercent:
    '@id': stencila:characterPercent
    description: The percentage of characters in the provenance category.
    $ref: UnsignedInteger
