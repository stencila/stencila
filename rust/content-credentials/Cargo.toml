[package]
name = "stencila-content-credentials"
edition = "2024"
version.workspace = true

[features]
default = []
cli = ["dep:clap", "dep:stencila-cli-utils"]

[dependencies]
c2pa = { version = "0.82.1", default-features = false, features = ["rust_native_crypto", "file_io", "pdf"] }
chrono = { workspace = true }
clap = { workspace = true, optional = true }
eyre = { workspace = true }
mime_guess = { workspace = true }
rcgen = { version = "0.14.7", default-features = false, features = ["pem", "ring"] }
reqwest = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
sha2 = { workspace = true }
stencila-cli-utils = { path = "../cli-utils", optional = true }
stencila-dirs = { path = "../dirs" }
stencila-version = { path = "../version" }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }

[lints]
workspace = true
