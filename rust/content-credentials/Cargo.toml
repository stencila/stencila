[package]
name = "stencila-content-credentials"
edition = "2024"
version.workspace = true

[features]
default = []
cli = ["dep:clap", "dep:stencila-cli-utils", "dep:stencila-convert"]
export = [
    "dep:image",
    "dep:stencila-codec-info",
    "dep:stencila-codec-text-trait",
    "dep:stencila-codec-utils",
    "dep:stencila-convert",
    "dep:stencila-node-find",
    "dep:stencila-node-media",
]

[dependencies]
Inflector = { workspace = true }
base64 = { workspace = true }
c2pa = { version = "0.82.1", default-features = false, features = ["rust_native_crypto", "file_io", "pdf"] }
chrono = { workspace = true }
clap = { workspace = true, optional = true }
eyre = { workspace = true }
image = { workspace = true, optional = true }
lopdf = { workspace = true }
mime_guess = { workspace = true }
rcgen = { version = "0.14.7", default-features = false, features = ["pem", "ring"] }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
sha2 = { workspace = true }
stencila-cli-utils = { path = "../cli-utils", optional = true }
stencila-codec-info = { path = "../codec-info", optional = true }
stencila-codec-text-trait = { path = "../codec-text-trait", optional = true }
stencila-codec-utils = { path = "../codec-utils", optional = true }
stencila-convert = { path = "../convert", optional = true }
stencila-dirs = { path = "../dirs" }
stencila-node-find = { path = "../node-find", optional = true }
stencila-node-media = { path = "../node-media", optional = true }
stencila-schema = { path = "../schema" }
stencila-secrets = { path = "../secrets" }
stencila-version = { path = "../version" }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }

[lints]
workspace = true
