    - pattern: $TARGET = readlines($PATH, $$$ARGS)
    - pattern: $TARGET = readlines($PATH)
    - pattern: $READER.readlines($PATH, $$$ARGS)
    - pattern: $READER.readlines($PATH)
    - pattern: readlines($PATH, $$$ARGS)
    - pattern: readlines($PATH)
    - pattern: $TARGET = $READER.readline($PATH, $$$ARGS)
