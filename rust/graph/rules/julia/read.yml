    - pattern: $TARGET = readline($PATH)
    - pattern: $READER.readline($PATH, $$$ARGS)
    - pattern: $READER.readline($PATH)
    - pattern: readline($PATH, $$$ARGS)
    - pattern: readline($PATH)
    - pattern: $TARGET = $READER.readchomp($PATH, $$$ARGS)
