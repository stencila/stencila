id: julia-read
language: Julia
message: Julia file read
severity: info
rule:
  any:
    - pattern: $TARGET = CSV.read($PATH, $$$ARGS)
    - pattern: CSV.read($PATH, $$$ARGS)
    - pattern: $TARGET = CSV.File($PATH)
    - pattern: CSV.File($PATH)
