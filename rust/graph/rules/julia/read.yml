id: julia-read
language: Julia

# Pattern order convention within each API family:
#
# 1. assignment + namespaced call, variadic before fixed arity
# 2. assignment + bare function call, variadic before fixed arity
# 3. namespaced call without assignment, variadic before fixed arity
# 4. bare function call without assignment, variadic before fixed arity
#
# Keyword-argument variants for these functions are also handled by the Julia
# text scanner in `code/scan/io.rs`.
rule:
  any:
    # Core Julia file readers and handles. The `open`, `h5open`, and `NCDataset`
    # rules use MODE to reclassify write and read-write modes in Rust
    # normalization.
    - pattern: $TARGET = $READER.open($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = $READER.open($PATH, $MODE)
    - pattern: $TARGET = $READER.open($PATH)
    - pattern: $TARGET = open($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = open($PATH, $MODE)
    - pattern: $TARGET = open($PATH)
    - pattern: $READER.open($PATH, $MODE, $$$ARGS)
    - pattern: $READER.open($PATH, $MODE)
    - pattern: $READER.open($PATH)
    - pattern: open($PATH, $MODE, $$$ARGS)
    - pattern: open($PATH, $MODE)
    - pattern: open($PATH)
    - pattern: $TARGET = $READER.read($PATH, $$$ARGS)
    - pattern: $TARGET = $READER.read($PATH)
    - pattern: $TARGET = read($PATH, $$$ARGS)
    - pattern: $TARGET = read($PATH)
    - pattern: $READER.read($PATH, $$$ARGS)
    - pattern: $READER.read($PATH)
    - pattern: read($PATH, $$$ARGS)
    - pattern: read($PATH)
    - pattern: $TARGET = $READER.readlines($PATH, $$$ARGS)
