    - pattern: cat($VALUE, file = $PATH)
    - pattern: $WRITER::sink($PATH, $$$ARGS)
    - pattern: $WRITER::sink($PATH)
    - pattern: sink($PATH, $$$ARGS)
    - pattern: sink($PATH)
    - pattern: $WRITER::sink(file = $PATH, $$$ARGS)
    - pattern: $WRITER::sink(file = $PATH)
    - pattern: sink(file = $PATH, $$$ARGS)
    - pattern: sink(file = $PATH)

    - pattern: $WRITER::saveRDS($VALUE, $PATH, $$$ARGS)
