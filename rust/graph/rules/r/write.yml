id: r-write
language: R

# Pattern order convention within each API family:
#
# 1. namespaced call, variadic before fixed arity
# 2. bare function call, variadic before fixed arity
#
# Core connection constructors with MODE are classified from read.yml because
# mode strings decide whether the operation reads, writes, or does both.
rule:
  any:
    # Base R table, text, serialization, and binary writers.
    - pattern: $WRITER::write.table($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER::write.table($VALUE, $PATH)
    - pattern: write.table($VALUE, $PATH, $$$ARGS)
    - pattern: write.table($VALUE, $PATH)
    - pattern: $WRITER::write.table($VALUE, file = $PATH, $$$ARGS)
    - pattern: $WRITER::write.table($VALUE, file = $PATH)
    - pattern: write.table($VALUE, file = $PATH, $$$ARGS)
    - pattern: write.table($VALUE, file = $PATH)

    - pattern: $WRITER::write.csv($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER::write.csv($VALUE, $PATH)
    - pattern: write.csv($VALUE, $PATH, $$$ARGS)
    - pattern: write.csv($VALUE, $PATH)
    - pattern: $WRITER::write.csv($VALUE, file = $PATH, $$$ARGS)
    - pattern: $WRITER::write.csv($VALUE, file = $PATH)
    - pattern: write.csv($VALUE, file = $PATH, $$$ARGS)
    - pattern: write.csv($VALUE, file = $PATH)

    - pattern: $WRITER::write.csv2($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER::write.csv2($VALUE, $PATH)
    - pattern: write.csv2($VALUE, $PATH, $$$ARGS)
    - pattern: write.csv2($VALUE, $PATH)
    - pattern: $WRITER::write.csv2($VALUE, file = $PATH, $$$ARGS)
    - pattern: $WRITER::write.csv2($VALUE, file = $PATH)
    - pattern: write.csv2($VALUE, file = $PATH, $$$ARGS)
    - pattern: write.csv2($VALUE, file = $PATH)

    - pattern: $WRITER::write($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER::write($VALUE, $PATH)
    - pattern: write($VALUE, $PATH, $$$ARGS)
    - pattern: write($VALUE, $PATH)
    - pattern: $WRITER::write($VALUE, file = $PATH, $$$ARGS)
    - pattern: $WRITER::write($VALUE, file = $PATH)
    - pattern: write($VALUE, file = $PATH, $$$ARGS)
    - pattern: write($VALUE, file = $PATH)

    - pattern: $WRITER::writeLines($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER::writeLines($VALUE, $PATH)
    - pattern: writeLines($VALUE, $PATH, $$$ARGS)
    - pattern: writeLines($VALUE, $PATH)
    - pattern: $WRITER::writeLines($VALUE, con = $PATH, $$$ARGS)
    - pattern: $WRITER::writeLines($VALUE, con = $PATH)
    - pattern: writeLines($VALUE, con = $PATH, $$$ARGS)
    - pattern: writeLines($VALUE, con = $PATH)

    - pattern: $WRITER::cat($VALUE, file = $PATH, $$$ARGS)
