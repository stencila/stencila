    - pattern: read.csv(file = $PATH, $$$ARGS)
    - pattern: read_csv($PATH)
    - pattern: read_csv($PATH, $$$ARGS)
    - pattern: read_csv(file = $PATH)
    - pattern: read_csv(file = $PATH, $$$ARGS)
