id: r-read
language: R

# Pattern order convention within each API family:
#
# 1. assignment + namespaced call, variadic before fixed arity
# 2. assignment + bare function call, variadic before fixed arity
# 3. namespaced call without assignment, variadic before fixed arity
# 4. bare function call without assignment, variadic before fixed arity
#
# Include both `<-` and `=` assignment forms for read targets.
rule:
  any:
