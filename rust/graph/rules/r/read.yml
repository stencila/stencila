    # modes in Rust normalization.
    - pattern: $TARGET <- $READER::file($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET <- $READER::file($PATH, $MODE)
    - pattern: $TARGET = $READER::file($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = $READER::file($PATH, $MODE)
    - pattern: $TARGET <- file($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET <- file($PATH, $MODE)
    - pattern: $TARGET = file($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = file($PATH, $MODE)
    - pattern: $READER::file($PATH, $MODE, $$$ARGS)
    - pattern: $READER::file($PATH, $MODE)
    - pattern: file($PATH, $MODE, $$$ARGS)
    - pattern: file($PATH, $MODE)
    - pattern: $TARGET <- $READER::file($PATH, open = $MODE, $$$ARGS)
    - pattern: $TARGET <- $READER::file($PATH, open = $MODE)
    - pattern: $TARGET = $READER::file($PATH, open = $MODE, $$$ARGS)
    - pattern: $TARGET = $READER::file($PATH, open = $MODE)
    - pattern: $TARGET <- file($PATH, open = $MODE, $$$ARGS)
