id: python-write
language: Python

# Pattern order convention within each API family:
#
# 1. assignment + namespaced/method call, variadic before fixed arity
# 2. assignment + bare function call, variadic before fixed arity
# 3. namespaced/method call without assignment, variadic before fixed arity
# 4. bare function call without assignment, variadic before fixed arity
#
# Keep read.yml and write.yml groups in the same broad order for auditability.
rule:
  any:
    # Core Python file writes are classified from `open(...)` patterns in
    # read.yml because MODE determines the final direction.

    # Tabular dataframe writers. Named-argument variants for these functions are
    # also handled by the Python text scanner in `code/scan/io.rs`.
    - pattern: $OBJ.to_csv($PATH, $$$ARGS)
    - pattern: $OBJ.to_csv($PATH)
    - pattern: $OBJ.to_csv(path_or_buf=$PATH, $$$ARGS)
    - pattern: $OBJ.to_csv(path_or_buf=$PATH)
    - pattern: to_csv($PATH, $$$ARGS)
    - pattern: to_csv($PATH)
    - pattern: to_csv(path_or_buf=$PATH, $$$ARGS)
    - pattern: to_csv(path_or_buf=$PATH)
    - pattern: $OBJ.to_excel($PATH, $$$ARGS)
    - pattern: $OBJ.to_excel($PATH)
    - pattern: to_excel($PATH, $$$ARGS)
    - pattern: to_excel($PATH)
    - pattern: $OBJ.to_json($PATH, $$$ARGS)
    - pattern: $OBJ.to_json($PATH)
    - pattern: to_json($PATH, $$$ARGS)
    - pattern: to_json($PATH)
    - pattern: $OBJ.to_html($PATH, $$$ARGS)
    - pattern: $OBJ.to_html($PATH)
    - pattern: to_html($PATH, $$$ARGS)
    - pattern: to_html($PATH)
    - pattern: $OBJ.to_parquet($PATH, $$$ARGS)
    - pattern: $OBJ.to_parquet($PATH)
    - pattern: to_parquet($PATH, $$$ARGS)
    - pattern: to_parquet($PATH)
    - pattern: $OBJ.to_feather($PATH, $$$ARGS)
    - pattern: $OBJ.to_feather($PATH)
    - pattern: to_feather($PATH, $$$ARGS)
    - pattern: to_feather($PATH)
    - pattern: $OBJ.to_pickle($PATH, $$$ARGS)
    - pattern: $OBJ.to_pickle($PATH)
    - pattern: to_pickle($PATH, $$$ARGS)
    - pattern: to_pickle($PATH)
    - pattern: $OBJ.to_hdf($PATH, $$$ARGS)
    - pattern: $OBJ.to_hdf($PATH)
    - pattern: to_hdf($PATH, $$$ARGS)
    - pattern: to_hdf($PATH)
    - pattern: $OBJ.to_orc($PATH, $$$ARGS)
    - pattern: $OBJ.to_orc($PATH)
    - pattern: to_orc($PATH, $$$ARGS)
    - pattern: to_orc($PATH)
    - pattern: $OBJ.to_stata($PATH, $$$ARGS)
    - pattern: $OBJ.to_stata($PATH)
    - pattern: to_stata($PATH, $$$ARGS)
    - pattern: to_stata($PATH)
    - pattern: $OBJ.to_xml($PATH, $$$ARGS)
    - pattern: $OBJ.to_xml($PATH)
    - pattern: to_xml($PATH, $$$ARGS)
    - pattern: to_xml($PATH)
    - pattern: $OBJ.to_latex($PATH, $$$ARGS)
    - pattern: $OBJ.to_latex($PATH)
    - pattern: $OBJ.to_latex(buf=$PATH, $$$ARGS)
    - pattern: $OBJ.to_latex(buf=$PATH)
    - pattern: to_latex($PATH, $$$ARGS)
    - pattern: to_latex($PATH)
    - pattern: to_latex(buf=$PATH, $$$ARGS)
    - pattern: to_latex(buf=$PATH)
    - pattern: $OBJ.to_markdown($PATH, $$$ARGS)
    - pattern: $OBJ.to_markdown($PATH)
    - pattern: $OBJ.to_markdown(buf=$PATH, $$$ARGS)
    - pattern: $OBJ.to_markdown(buf=$PATH)
    - pattern: to_markdown($PATH, $$$ARGS)
    - pattern: to_markdown($PATH)
    - pattern: to_markdown(buf=$PATH, $$$ARGS)
    - pattern: to_markdown(buf=$PATH)
    - pattern: $OBJ.to_file($PATH, $$$ARGS)
    - pattern: $OBJ.to_file($PATH)
    - pattern: to_file($PATH, $$$ARGS)
    - pattern: to_file($PATH)

    # Array, matrix, and model writers used by NumPy, SciPy, and joblib-style APIs.
    - pattern: np.save($PATH, $VALUE, $$$ARGS)
    - pattern: np.save($PATH, $VALUE)
    - pattern: numpy.save($PATH, $VALUE, $$$ARGS)
    - pattern: numpy.save($PATH, $VALUE)
    - pattern: save($PATH, $VALUE, $$$ARGS)
    - pattern: save($PATH, $VALUE)
    - pattern: $WRITER.savez($PATH, $$$ARGS)
    - pattern: savez($PATH, $$$ARGS)
    - pattern: $WRITER.savez_compressed($PATH, $$$ARGS)
    - pattern: savez_compressed($PATH, $$$ARGS)
    - pattern: $WRITER.savetxt($PATH, $VALUE, $$$ARGS)
    - pattern: $WRITER.savetxt($PATH, $VALUE)
    - pattern: savetxt($PATH, $VALUE, $$$ARGS)
    - pattern: savetxt($PATH, $VALUE)
    - pattern: $VALUE.tofile($PATH, $$$ARGS)
    - pattern: $VALUE.tofile($PATH)
    - pattern: tofile($PATH, $$$ARGS)
    - pattern: tofile($PATH)
    - pattern: $WRITER.savemat($PATH, $VALUE, $$$ARGS)
    - pattern: $WRITER.savemat($PATH, $VALUE)
    - pattern: savemat($PATH, $VALUE, $$$ARGS)
    - pattern: savemat($PATH, $VALUE)
    - pattern: $WRITER.dump($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER.dump($VALUE, $PATH)
    - pattern: dump($VALUE, $PATH, $$$ARGS)
    - pattern: dump($VALUE, $PATH)
    - pattern: torch.save($VALUE, $PATH, $$$ARGS)
    - pattern: torch.save($VALUE, $PATH)
    - pattern: $WRITER.save_file($VALUE, $PATH, $$$ARGS)
    - pattern: $WRITER.save_file($VALUE, $PATH)
    - pattern: save_file($VALUE, $PATH, $$$ARGS)
    - pattern: save_file($VALUE, $PATH)

    # Labeled arrays, geospatial stores, and chunked array stores.
    - pattern: $OBJ.to_netcdf($PATH, $$$ARGS)
    - pattern: $OBJ.to_netcdf($PATH)
    - pattern: to_netcdf($PATH, $$$ARGS)
    - pattern: to_netcdf($PATH)
    - pattern: $OBJ.to_zarr($PATH, $$$ARGS)
    - pattern: $OBJ.to_zarr($PATH)
    - pattern: to_zarr($PATH, $$$ARGS)
    - pattern: to_zarr($PATH)

    # Images, plots, and media writers.
    - pattern: $OBJ.savefig($PATH, $$$ARGS)
    - pattern: $OBJ.savefig($PATH)
    - pattern: $OBJ.savefig(fname=$PATH, $$$ARGS)
    - pattern: $OBJ.savefig(fname=$PATH)
    - pattern: savefig($PATH, $$$ARGS)
    - pattern: savefig($PATH)
    - pattern: savefig(fname=$PATH, $$$ARGS)
    - pattern: savefig(fname=$PATH)
    - pattern: $WRITER.imwrite($PATH, $VALUE, $$$ARGS)
    - pattern: $WRITER.imwrite($PATH, $VALUE)
    - pattern: imwrite($PATH, $VALUE, $$$ARGS)
    - pattern: imwrite($PATH, $VALUE)
    - pattern: $WRITER.imsave($PATH, $VALUE, $$$ARGS)
    - pattern: $WRITER.imsave($PATH, $VALUE)
    - pattern: imsave($PATH, $VALUE, $$$ARGS)
    - pattern: imsave($PATH, $VALUE)
    - pattern: $OBJ.save($PATH, $$$ARGS)
    - pattern: $OBJ.save($PATH)
    - pattern: $WRITER.write($PATH, $VALUE, $$$ARGS)
    - pattern: $WRITER.write($PATH, $VALUE)
    - pattern: write($PATH, $VALUE, $$$ARGS)
    - pattern: write($PATH, $VALUE)
    - pattern: Path($PATH).write_text($VALUE, $$$ARGS)
    - pattern: Path($PATH).write_text($VALUE)
    - pattern: Path($PATH).write_bytes($VALUE, $$$ARGS)
    - pattern: Path($PATH).write_bytes($VALUE)
    - pattern: $WRITER.Path($PATH).write_text($VALUE, $$$ARGS)
    - pattern: $WRITER.Path($PATH).write_text($VALUE)
    - pattern: $WRITER.Path($PATH).write_bytes($VALUE, $$$ARGS)
    - pattern: $WRITER.Path($PATH).write_bytes($VALUE)

    # URL download helpers. `urlretrieve` is also represented as a read in
    # read.yml so both the remote source and local destination are visible.
    - pattern: $WRITER.urlretrieve($URL, $PATH, $$$ARGS)
    - pattern: $WRITER.urlretrieve($URL, $PATH)
    - pattern: urlretrieve($URL, $PATH, $$$ARGS)
    - pattern: urlretrieve($URL, $PATH)

    # Copy helpers are read/write operations split across read.yml and this
    # file; this file captures the destination path.
    - pattern: $WRITER.copyfile($SRC, $PATH, $$$ARGS)
    - pattern: $WRITER.copyfile($SRC, $PATH)
    - pattern: copyfile($SRC, $PATH, $$$ARGS)
    - pattern: copyfile($SRC, $PATH)
    - pattern: $WRITER.copy($SRC, $PATH, $$$ARGS)
    - pattern: $WRITER.copy($SRC, $PATH)
    - pattern: copy($SRC, $PATH, $$$ARGS)
    - pattern: copy($SRC, $PATH)
    - pattern: $WRITER.copy2($SRC, $PATH, $$$ARGS)
    - pattern: $WRITER.copy2($SRC, $PATH)
    - pattern: copy2($SRC, $PATH, $$$ARGS)
    - pattern: copy2($SRC, $PATH)
    - pattern: $WRITER.copytree($SRC, $PATH, $$$ARGS)
    - pattern: $WRITER.copytree($SRC, $PATH)
    - pattern: copytree($SRC, $PATH, $$$ARGS)
    - pattern: copytree($SRC, $PATH)
    - pattern: $WRITER.move($SRC, $PATH, $$$ARGS)
    - pattern: $WRITER.move($SRC, $PATH)
    - pattern: move($SRC, $PATH, $$$ARGS)
    - pattern: move($SRC, $PATH)
