    - pattern: $TARGET = $READER.Path($PATH).open()
    - pattern: $READER.Path($PATH).open($MODE, $$$ARGS)
    - pattern: $READER.Path($PATH).open($MODE)
    - pattern: $READER.Path($PATH).open()
    - pattern: $TARGET = Path($PATH).read_text($$$ARGS)
    - pattern: $TARGET = Path($PATH).read_bytes($$$ARGS)
    - pattern: Path($PATH).read_text($$$ARGS)
    - pattern: Path($PATH).read_bytes($$$ARGS)
    - pattern: $TARGET = $READER.Path($PATH).read_text($$$ARGS)
