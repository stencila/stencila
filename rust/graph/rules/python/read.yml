id: python-read
language: Python

# Pattern order convention within each API family:
#
# 1. assignment + namespaced/method call, variadic before fixed arity
# 2. assignment + bare function call, variadic before fixed arity
# 3. namespaced/method call without assignment, variadic before fixed arity
# 4. bare function call without assignment, variadic before fixed arity
#
# Keep read.yml and write.yml groups in the same broad order for auditability.
rule:
  any:
    # Core Python file and HDF5 handles. The `open` rule uses MODE to reclassify
    # write and read-write modes in Rust normalization.
    - pattern: $TARGET = open($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = open($PATH, $MODE)
    - pattern: $TARGET = open($PATH)
    - pattern: open($PATH, $MODE, $$$ARGS)
    - pattern: open($PATH, $MODE)
    - pattern: open($PATH)
    - pattern: $TARGET = $READER.open($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = $READER.open($PATH, $MODE)
    - pattern: $TARGET = $READER.open($PATH)
    - pattern: $READER.open($PATH, $MODE, $$$ARGS)
    - pattern: $READER.open($PATH, $MODE)
    - pattern: $READER.open($PATH)
    - pattern: $TARGET = $READER.File($PATH, $MODE, $$$ARGS)
    - pattern: $TARGET = $READER.File($PATH, $MODE)
    - pattern: $TARGET = $READER.File($PATH)
    - pattern: $READER.File($PATH, $MODE, $$$ARGS)
    - pattern: $READER.File($PATH, $MODE)
    - pattern: $READER.File($PATH)
    - pattern: $TARGET = Path($PATH).open($MODE, $$$ARGS)
    - pattern: $TARGET = Path($PATH).open($MODE)
    - pattern: $TARGET = Path($PATH).open()
    - pattern: Path($PATH).open($MODE, $$$ARGS)
    - pattern: Path($PATH).open($MODE)
    - pattern: Path($PATH).open()
    - pattern: $TARGET = $READER.Path($PATH).open($MODE, $$$ARGS)
