id: python-read
language: Python
rule:
  any:
    - pattern: $TARGET = $READER.read_csv($PATH)
    - pattern: $TARGET = $READER.read_csv($PATH, $$$ARGS)
    - pattern: $TARGET = $READER.read_csv(filepath_or_buffer=$PATH)
    - pattern: $TARGET = $READER.read_csv(filepath_or_buffer=$PATH, $$$ARGS)
    - pattern: $TARGET = read_csv($PATH)
    - pattern: $TARGET = read_csv($PATH, $$$ARGS)
    - pattern: $TARGET = read_csv(filepath_or_buffer=$PATH)
    - pattern: $TARGET = read_csv(filepath_or_buffer=$PATH, $$$ARGS)
    - pattern: $READER.read_csv($PATH)
    - pattern: $READER.read_csv($PATH, $$$ARGS)
    - pattern: $READER.read_csv(filepath_or_buffer=$PATH)
    - pattern: $READER.read_csv(filepath_or_buffer=$PATH, $$$ARGS)
    - pattern: read_csv($PATH)
    - pattern: read_csv($PATH, $$$ARGS)
    - pattern: read_csv(filepath_or_buffer=$PATH)
    - pattern: read_csv(filepath_or_buffer=$PATH, $$$ARGS)
    - pattern: $TARGET = open($PATH)
    - pattern: open($PATH)
    - pattern: $TARGET = open($PATH, $MODE)
    - pattern: $TARGET = open($PATH, $MODE, $$$ARGS)
    - pattern: open($PATH, $MODE)
    - pattern: open($PATH, $MODE, $$$ARGS)
