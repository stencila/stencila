id: python-read
language: Python
rule:
  any:
    - pattern: $TARGET = $READER.read_csv($PATH)
    - pattern: $TARGET = read_csv($PATH)
    - pattern: $READER.read_csv($PATH)
    - pattern: read_csv($PATH)
    - pattern: $TARGET = open($PATH)
    - pattern: open($PATH)
    - pattern: $TARGET = open($PATH, $MODE)
    - pattern: open($PATH, $MODE)
