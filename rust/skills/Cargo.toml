[package]
name = "stencila-skills"
edition = "2024"
version.workspace = true

[features]
cli = ["clap", "stencila-cli-utils"]

[dependencies]
Inflector = { workspace = true }
derive_more = { workspace = true }
eyre = { workspace = true }
glob = { workspace = true }
regex = { workspace = true }
rust-embed = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
stencila-codec-markdown = { path = "../codec-markdown" }
stencila-codec-text = { path = "../codec-text" }
stencila-codecs = { path = "../codecs" }
stencila-dirs = { path = "../dirs" }
stencila-schema = { path = "../schema" }
stencila-version = { path = "../version" }
strum = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

# Optional CLI dependencies
clap = { workspace = true, optional = true }
stencila-cli-utils = { path = "../cli-utils", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
